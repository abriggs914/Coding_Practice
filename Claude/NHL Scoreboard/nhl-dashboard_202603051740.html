<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NHL Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ice: #e8f4fc;
    --ice-dark: #c5dff0;
    --rink: #0a1628;
    --rink-mid: #112240;
    --rink-light: #1a3a6b;
    --accent: #00b4d8;
    --accent2: #ff6b35;
    --gold: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --text: #e2eaf4;
    --text-dim: #7a9bb5;
    --card-bg: #0f2137;
    --card-border: #1e3a5f;
    --live-pulse: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--rink);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,180,216,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(26,58,107,0.3) 0%, transparent 60%);
  }

  /* ──── HEADER ──── */
  header {
    background: linear-gradient(135deg, #071523 0%, #0d2444 100%);
    border-bottom: 2px solid var(--accent);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo span { color: var(--accent); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .spoiler-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--rink-light);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text);
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .spoiler-toggle:hover { background: #213d6e; border-color: var(--accent); }
  .spoiler-toggle.active { background: #1a3a2e; border-color: var(--green); color: var(--green); }

  .eye-icon { font-size: 1rem; }

  /* ──── NAV TABS ──── */
  nav {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--card-border);
    background: var(--rink-mid);
    padding: 0 24px;
  }

  .nav-tab {
    padding: 14px 22px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ──── MAIN ──── */
  main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ──── DATE NAV ──── */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 24px;
  }

  .date-btn {
    background: var(--rink-light);
    border: 1px solid var(--card-border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .date-btn:hover { background: var(--accent); border-color: var(--accent); }

  .date-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--text);
    min-width: 240px;
    text-align: center;
  }

  .today-btn {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent);
    color: var(--rink);
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .today-btn:hover { opacity: 0.85; }

  .refresh-info {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .refresh-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ──── GAME CARDS GRID ──── */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }

  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .game-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

  .game-card.live { border-color: var(--live-pulse); box-shadow: 0 0 16px rgba(0,255,136,0.15); }

  .card-header {
    background: linear-gradient(135deg, #0d2444 0%, #112240 100%);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--card-border);
  }

  .game-status {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .status-live { background: rgba(0,255,136,0.15); color: var(--live-pulse); border: 1px solid var(--live-pulse); }
  .status-final { background: rgba(122,155,181,0.15); color: var(--text-dim); border: 1px solid #2a4060; }
  .status-pre { background: rgba(0,180,216,0.12); color: var(--accent); border: 1px solid rgba(0,180,216,0.4); }
  .status-ppd { background: rgba(255,107,53,0.12); color: var(--accent2); border: 1px solid rgba(255,107,53,0.4); }

  .game-venue {
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.68rem;
    color: var(--live-pulse);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live-pulse);
    animation: pulse 1s infinite;
  }

  /* Teams section */
  .teams-section {
    padding: 18px 16px;
  }

  .team-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
  }
  .team-row:first-child { border-bottom: 1px solid rgba(255,255,255,0.06); }

  .team-logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
    margin-right: 12px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .team-logo-placeholder {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--rink-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-right: 12px;
  }

  .team-info { flex: 1; }
  .team-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .team-record { font-size: 0.72rem; color: var(--text-dim); margin-top: 1px; }

  .team-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 1px;
    color: var(--text);
    min-width: 36px;
    text-align: right;
  }
  .team-score.winning { color: var(--gold); }

  /* Spoiler shield */
  .spoiler-shield {
    position: absolute;
    inset: 0;
    background: var(--rink-mid);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    cursor: pointer;
    transition: opacity 0.3s;
    border-radius: 14px;
  }
  .spoiler-shield .shield-icon { font-size: 2rem; }
  .spoiler-shield p { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  body.spoiler-off .spoiler-shield { display: none; }

  /* Card footer - scorers */
  .card-footer {
    border-top: 1px solid var(--card-border);
    padding: 12px 16px;
    background: rgba(0,0,0,0.2);
  }

  .scorers-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .scorer-list { display: flex; flex-direction: column; gap: 4px; }

  .scorer-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.78rem;
  }
  .scorer-name { color: var(--text); font-weight: 500; }
  .scorer-detail { color: var(--text-dim); font-size: 0.7rem; }
  .scorer-goals {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gold);
    background: rgba(255,209,102,0.1);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Game situation badge */
  .game-situation {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--card-border);
    flex-wrap: wrap;
  }

  .situation-badge {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,107,53,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
  }
  .situation-badge.pp { background: rgba(255,209,102,0.15); color: var(--gold); border-color: rgba(255,209,102,0.3); }
  .situation-badge.en { background: rgba(239,71,111,0.15); color: var(--red); border-color: rgba(239,71,111,0.3); }

  .period-time {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .start-time {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    text-align: center;
    padding: 8px;
    letter-spacing: 1px;
  }

  /* ──── LOADING / EMPTY ──── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
    color: var(--text-dim);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-games {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  /* ──── STANDINGS ──── */
  .standings-container { display: flex; flex-direction: column; gap: 32px; }

  .division-block {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
  }

  .division-header {
    background: linear-gradient(135deg, #0d2444 0%, #112240 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--accent);
  }

  .division-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .conference-tag {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--rink-light);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .standings-table {
    width: 100%;
    border-collapse: collapse;
  }
  .standings-table th {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 10px 16px;
    text-align: center;
    border-bottom: 1px solid var(--card-border);
    background: rgba(0,0,0,0.2);
  }
  .standings-table th:first-child { text-align: left; }

  .standings-table td {
    padding: 12px 16px;
    text-align: center;
    font-size: 0.82rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .standings-table td:first-child { text-align: left; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: rgba(255,255,255,0.03); }

  .team-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .standings-logo {
    width: 28px; height: 28px;
    object-fit: contain;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }
  .standings-logo-placeholder {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--rink-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-family: 'Bebas Neue', sans-serif;
    color: var(--text-dim);
  }
  .team-abbrev { font-weight: 700; color: var(--text); font-size: 0.85rem; }
  .team-fullname { font-size: 0.72rem; color: var(--text-dim); }

  .pts-cell { font-weight: 700; color: var(--gold); font-family: 'Roboto Mono', monospace; }
  .pctg-cell { color: var(--accent); font-family: 'Roboto Mono', monospace; font-size: 0.75rem; }
  .streak-cell { font-size: 0.72rem; }
  .streak-w { color: var(--green); font-weight: 600; }
  .streak-l { color: var(--red); font-weight: 600; }
  .streak-ot { color: var(--gold); font-weight: 600; }

  .wildcard-row td { background: rgba(0,180,216,0.04); }
  .wildcard-divider td { border-top: 2px dashed rgba(0,180,216,0.3); }
  .in-playoffs td:first-child { border-left: 3px solid var(--green); }

  /* ──── PLAYOFF BRACKET ──── */
  .bracket-container { overflow-x: auto; }

  .bracket-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--text);
    text-align: center;
    margin-bottom: 8px;
  }
  .bracket-subtitle {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  .bracket-grid {
    display: flex;
    gap: 0;
    justify-content: center;
    min-width: 900px;
  }

  .bracket-round {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    flex: 1;
    padding: 0 12px;
  }

  .bracket-round-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--card-border);
  }

  .matchup {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    overflow: hidden;
    margin: 8px 0;
    position: relative;
    transition: border-color 0.2s;
  }
  .matchup:hover { border-color: var(--accent); }
  .matchup.tbd { opacity: 0.5; }

  .matchup-team {
    display: flex;
    align-items: center;
    padding: 9px 12px;
    gap: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
  }
  .matchup-team:first-child { border-bottom: 1px solid var(--card-border); }
  .matchup-team.winner { background: rgba(6,214,160,0.08); color: var(--green); }
  .matchup-team.eliminated { color: var(--text-dim); text-decoration: line-through; text-decoration-color: rgba(239,71,111,0.6); }

  .matchup-seed {
    font-size: 0.65rem;
    color: var(--text-dim);
    background: var(--rink-light);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Roboto Mono', monospace;
    min-width: 22px;
    text-align: center;
  }
  .matchup-wins {
    margin-left: auto;
    font-family: 'Roboto Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
  }
  .matchup-wins.max { color: var(--green); }

  .matchup-logo {
    width: 22px; height: 22px;
    object-fit: contain;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }

  .series-status {
    font-size: 0.62rem;
    text-align: center;
    padding: 4px;
    background: rgba(0,0,0,0.3);
    color: var(--text-dim);
    letter-spacing: 0.5px;
    border-top: 1px solid var(--card-border);
  }
  .series-status.active { color: var(--live-pulse); }

  .conference-bracket { margin-bottom: 48px; }
  .conference-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 16px;
    padding-left: 4px;
    border-left: 3px solid var(--accent);
    padding-left: 12px;
  }

  .stanley-cup-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 24px 0;
    gap: 12px;
  }
  .cup-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--gold);
  }
  .cup-matchup {
    width: 220px;
  }

  /* error */
  .error-msg {
    background: rgba(239,71,111,0.1);
    border: 1px solid rgba(239,71,111,0.3);
    color: var(--red);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 0.82rem;
    text-align: center;
    margin: 20px 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏒 <span>NHL</span> HUB</div>
  <div class="header-controls">
    <button class="spoiler-toggle" id="spoilerBtn" onclick="toggleSpoiler()">
      <span class="eye-icon">🙈</span>
      <span id="spoilerLabel">Hide Scores</span>
    </button>
  </div>
</header>

<nav>
  <div class="nav-tab active" onclick="switchTab('scores')">Scores</div>
  <div class="nav-tab" onclick="switchTab('standings')">Standings</div>
  <div class="nav-tab" onclick="switchTab('playoff')">Playoff Bracket</div>
</nav>

<main>

  <!-- ═══ SCORES TAB ═══ -->
  <div class="tab-content active" id="tab-scores">
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">◀</button>
      <div class="date-display" id="dateDisplay">—</div>
      <button class="date-btn" onclick="changeDate(1)">▶</button>
      <button class="today-btn" onclick="goToToday()">Today</button>
    </div>
    <div class="refresh-info">
      <span class="refresh-dot"></span>
      <span id="refreshLabel">Auto-refreshing every 30s</span>
    </div>
    <div id="gamesContainer">
      <div class="loading-state"><div class="spinner"></div><span>Loading games…</span></div>
    </div>
  </div>

  <!-- ═══ STANDINGS TAB ═══ -->
  <div class="tab-content" id="tab-standings">
    <div id="standingsContainer">
      <div class="loading-state"><div class="spinner"></div><span>Loading standings…</span></div>
    </div>
  </div>

  <!-- ═══ PLAYOFF TAB ═══ -->
  <div class="tab-content" id="tab-playoff">
    <div id="playoffContainer">
      <div class="loading-state"><div class="spinner"></div><span>Loading bracket…</span></div>
    </div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentDate = new Date();
let spoilerMode = false;
let refreshTimer = null;
let standingsLoaded = false;
let playoffLoaded = false;

const PROXY = 'https://corsproxy.io/?';
const API = 'https://api-web.nhle.com/v1';

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dy}`;
}

function displayDate(d) {
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  const str = d.toLocaleDateString('en-US', opts).toUpperCase();
  const today = fmtDate(new Date());
  const cur = fmtDate(d);
  if (cur === today) return 'TODAY — ' + str.split(', ').slice(1).join(', ');
  return str;
}

async function fetchNHL(path) {
  const url = PROXY + encodeURIComponent(API + path);
  const r = await fetch(url, { headers: { 'x-requested-with': 'XMLHttpRequest' } });
  if (!r.ok) throw new Error('API error ' + r.status);
  return r.json();
}

function toggleSpoiler() {
  spoilerMode = !spoilerMode;
  const btn = document.getElementById('spoilerBtn');
  const lbl = document.getElementById('spoilerLabel');
  if (spoilerMode) {
    document.body.classList.remove('spoiler-off');
    btn.classList.add('active');
    btn.querySelector('.eye-icon').textContent = '🙉';
    lbl.textContent = 'Show Scores';
  } else {
    document.body.classList.add('spoiler-off');
    btn.classList.remove('active');
    btn.querySelector('.eye-icon').textContent = '🙈';
    lbl.textContent = 'Hide Scores';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'standings' && !standingsLoaded) loadStandings();
  if (tab === 'playoff' && !playoffLoaded) loadPlayoff();
}

// DATE NAV
// ═══════════════════════════════════════════════════════════
function changeDate(delta) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + delta);
  loadGames();
}
function goToToday() {
  currentDate = new Date();
  loadGames();
}

// ═══════════════════════════════════════════════════════════
// GAMES
// ═══════════════════════════════════════════════════════════
async function loadGames() {
  clearTimeout(refreshTimer);
  document.getElementById('dateDisplay').textContent = displayDate(currentDate);
  document.getElementById('gamesContainer').innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading games…</span></div>';

  try {
    const data = await fetchNHL(`/score/${fmtDate(currentDate)}`);
    renderGames(data.games || []);
  } catch(e) {
    document.getElementById('gamesContainer').innerHTML = `<div class="error-msg">⚠️ Could not load games. ${e.message}</div>`;
  }

  const today = fmtDate(new Date());
  const cur = fmtDate(currentDate);
  if (cur === today) {
    refreshTimer = setTimeout(loadGames, 30000);
    document.getElementById('refreshLabel').textContent = 'Auto-refreshing every 30s';
  } else {
    document.getElementById('refreshLabel').textContent = 'Historical data — no auto-refresh';
  }
}

function renderGames(games) {
  const container = document.getElementById('gamesContainer');
  if (!games.length) {
    container.innerHTML = '<div class="no-games">🏒 No games scheduled for this date.</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'games-grid';

  for (const g of games) {
    grid.appendChild(buildCard(g));
  }
  container.innerHTML = '';
  container.appendChild(grid);
}

function buildCard(g) {
  const card = document.createElement('div');
  const state = g.gameState; // 'FUT','PRE','LIVE','CRIT','FINAL','OFF','PPD'
  const isLive = state === 'LIVE' || state === 'CRIT';
  const isFinal = state === 'FINAL' || state === 'OFF';
  const isPre = state === 'FUT' || state === 'PRE';

  card.className = 'game-card' + (isLive ? ' live' : '');

  const away = g.awayTeam, home = g.homeTeam;
  const awayScore = away.score ?? 0;
  const homeScore = home.score ?? 0;
  const awayWin = isFinal && awayScore > homeScore;
  const homeWin = isFinal && homeScore > awayScore;

  // Status label
  let statusHtml = '';
  if (isLive) statusHtml = `<span class="game-status status-live">Live</span>`;
  else if (isFinal) {
    const ot = g.periodDescriptor?.periodType;
    const label = ot === 'OT' ? 'Final/OT' : ot === 'SO' ? 'Final/SO' : 'Final';
    statusHtml = `<span class="game-status status-final">${label}</span>`;
  }
  else if (state === 'PPD') statusHtml = `<span class="game-status status-ppd">Postponed</span>`;
  else statusHtml = `<span class="game-status status-pre">Upcoming</span>`;

  // Period / time info
  let periodInfo = '';
  if (isLive) {
    const per = g.periodDescriptor;
    const pLabel = per?.periodType === 'OT' ? 'OT' : per?.periodType === 'SO' ? 'SO' : `P${per?.number || '?'}`;
    const clock = g.clock?.timeRemaining || '';
    const inInt = g.clock?.inIntermission;
    periodInfo = `<div class="game-situation">
      <span class="period-time">🕐 ${inInt ? 'INT' : pLabel} ${clock ? '— ' + clock : ''}</span>
      ${g.situation?.homeTeam?.strength === 'pp' ? `<span class="situation-badge pp">🏒 ${home.abbrev} PP</span>` : ''}
      ${g.situation?.awayTeam?.strength === 'pp' ? `<span class="situation-badge pp">🏒 ${away.abbrev} PP</span>` : ''}
      ${g.situation?.homeTeam?.emptyNet ? `<span class="situation-badge en">EN ${home.abbrev}</span>` : ''}
      ${g.situation?.awayTeam?.emptyNet ? `<span class="situation-badge en">EN ${away.abbrev}</span>` : ''}
    </div>`;
  }

  // Start time
  let startTimeHtml = '';
  if (isPre && g.startTimeUTC) {
    const t = new Date(g.startTimeUTC);
    const local = t.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
    startTimeHtml = `<div class="start-time">🕐 ${local}</div>`;
  }

  // Scorers
  const goals = (g.goals || []).slice().reverse();
  let scorersHtml = '';
  if (isFinal || isLive) {
    const scorerItems = goals.slice(0, 5).map(gl => {
      const teamAbbr = gl.teamAbbrev?.default || '';
      const name = gl.name?.default || 'Unknown';
      const assists = gl.assists?.map(a => a.name?.default?.split(' ').pop()).join(', ') || '';
      const time = gl.timeInPeriod ? `P${gl.periodDescriptor?.number} ${gl.timeInPeriod}` : '';
      return `<div class="scorer-item">
        <span class="scorer-name">${name} <span style="color:var(--accent);font-size:0.7rem">${teamAbbr}</span></span>
        <span class="scorer-detail">${assists ? '🍎 ' + assists + ' · ' : ''}${time}</span>
      </div>`;
    }).join('');

    if (goals.length) {
      scorersHtml = `<div class="card-footer">
        <div class="scorers-label">Goal Scorers</div>
        <div class="scorer-list">${scorerItems}</div>
        ${goals.length > 5 ? `<div style="font-size:0.7rem;color:var(--text-dim);margin-top:6px">+${goals.length - 5} more goals</div>` : ''}
      </div>`;
    }
  }

  // Pre-game: team leaders
  let leadersHtml = '';
  if (isPre) {
    const awayLeaders = away.leaders || [];
    const homeLeaders = home.leaders || [];
    const allLeaders = [...awayLeaders.slice(0,1).map(l => ({...l, team: away.abbrev})),
                        ...homeLeaders.slice(0,1).map(l => ({...l, team: home.abbrev}))];
    if (allLeaders.length) {
      const items = allLeaders.map(l => {
        const name = l.name?.default || 'N/A';
        const pts = l.value || '';
        const cat = l.category || 'pts';
        return `<div class="scorer-item">
          <span class="scorer-name">${name} <span style="color:var(--accent);font-size:0.7rem">${l.team}</span></span>
          <span class="scorer-goals">${pts} ${cat}</span>
        </div>`;
      }).join('');
      leadersHtml = `<div class="card-footer">
        <div class="scorers-label">Team Leaders</div>
        <div class="scorer-list">${items}</div>
      </div>`;
    }
  }

  // Logos
  const awayLogoUrl = away.logo || away.darkLogo;
  const homeLogoUrl = home.logo || home.darkLogo;
  const awayLogoHtml = awayLogoUrl
    ? `<img class="team-logo" src="${awayLogoUrl}" alt="${away.abbrev}" onerror="this.style.display='none'">`
    : `<div class="team-logo-placeholder">${away.abbrev}</div>`;
  const homeLogoHtml = homeLogoUrl
    ? `<img class="team-logo" src="${homeLogoUrl}" alt="${home.abbrev}" onerror="this.style.display='none'">`
    : `<div class="team-logo-placeholder">${home.abbrev}</div>`;

  const awayRecordStr = away.record ? `<div class="team-record">${away.record}</div>` : '';
  const homeRecordStr = home.record ? `<div class="team-record">${home.record}</div>` : '';

  const venue = g.venue?.default || '';

  card.innerHTML = `
    <div class="spoiler-shield" onclick="revealCard(this)">
      <div class="shield-icon">🔒</div>
      <p>Click to reveal</p>
    </div>
    <div class="card-header">
      ${statusHtml}
      ${isLive ? `<div class="live-indicator"><span class="live-dot"></span>LIVE</div>` : `<div class="game-venue">${venue}</div>`}
    </div>
    ${periodInfo}
    ${startTimeHtml}
    <div class="teams-section">
      <div class="team-row">
        ${awayLogoHtml}
        <div class="team-info">
          <div class="team-name">${away.name?.default || away.placeName?.default || away.abbrev}</div>
          ${awayRecordStr}
        </div>
        <div class="team-score ${awayWin ? 'winning' : ''}">${!isPre ? awayScore : ''}</div>
      </div>
      <div class="team-row">
        ${homeLogoHtml}
        <div class="team-info">
          <div class="team-name">${home.name?.default || home.placeName?.default || home.abbrev}</div>
          ${homeRecordStr}
        </div>
        <div class="team-score ${homeWin ? 'winning' : ''}">${!isPre ? homeScore : ''}</div>
      </div>
    </div>
    ${scorersHtml}
    ${leadersHtml}
  `;
  return card;
}

function revealCard(shield) {
  shield.style.display = 'none';
}

// ═══════════════════════════════════════════════════════════
// STANDINGS
// ═══════════════════════════════════════════════════════════
async function loadStandings() {
  try {
    const data = await fetchNHL('/standings/now');
    renderStandings(data.standings || []);
    standingsLoaded = true;
  } catch(e) {
    document.getElementById('standingsContainer').innerHTML = `<div class="error-msg">⚠️ Could not load standings. ${e.message}</div>`;
  }
}

function renderStandings(teams) {
  const divMap = {};
  for (const t of teams) {
    const div = t.divisionName;
    const conf = t.conferenceName;
    if (!divMap[div]) divMap[div] = { conf, teams: [] };
    divMap[div].teams.push(t);
  }

  // Sort each division by points desc
  for (const d of Object.values(divMap)) {
    d.teams.sort((a,b) => b.points - a.points);
  }

  // Order: Atlantic, Metropolitan (East), Central, Pacific (West)
  const divOrder = ['Atlantic', 'Metropolitan', 'Central', 'Pacific'];

  let html = '<div class="standings-container">';
  for (const divName of divOrder) {
    const div = divMap[divName];
    if (!div) continue;
    html += buildDivisionTable(divName, div.conf, div.teams);
  }
  html += '</div>';
  document.getElementById('standingsContainer').innerHTML = html;
}

function buildDivisionTable(divName, conf, teams) {
  const rows = teams.map((t, i) => {
    const logo = t.teamLogo;
    const logoHtml = logo
      ? `<img class="standings-logo" src="${logo}" alt="${t.teamAbbrev?.default}" onerror="this.style.display='none'">`
      : `<div class="standings-logo-placeholder">${t.teamAbbrev?.default || '?'}</div>`;

    const streak = t.streakCode || '-';
    let streakClass = '';
    if (streak.startsWith('W')) streakClass = 'streak-w';
    else if (streak.startsWith('L')) streakClass = 'streak-l';
    else if (streak.startsWith('O')) streakClass = 'streak-ot';

    const inPlayoffs = i < 3; // Top 3 + wildcard
    const isWCLine = i === 3; // Start of wildcard

    return `<tr class="${inPlayoffs ? 'in-playoffs' : ''} ${isWCLine ? 'wildcard-divider' : ''}">
      <td><div class="team-cell">
        ${logoHtml}
        <div>
          <div class="team-abbrev">${t.teamAbbrev?.default || ''}</div>
          <div class="team-fullname">${t.teamName?.default || ''}</div>
        </div>
      </div></td>
      <td>${t.gamesPlayed || 0}</td>
      <td>${t.wins || 0}</td>
      <td>${t.losses || 0}</td>
      <td>${t.otLosses || 0}</td>
      <td class="pts-cell">${t.points || 0}</td>
      <td class="pctg-cell">${t.pointPctg?.toFixed(3) || '.000'}</td>
      <td>${t.goalFor || 0}</td>
      <td>${t.goalAgainst || 0}</td>
      <td class="${streakClass} streak-cell">${streak}</td>
      <td>${t.l10Wins || 0}-${t.l10Losses || 0}-${t.l10OtLosses || 0}</td>
    </tr>`;
  }).join('');

  return `<div class="division-block">
    <div class="division-header">
      <div class="division-name">${divName} Division</div>
      <div class="conference-tag">${conf} Conference</div>
    </div>
    <table class="standings-table">
      <thead>
        <tr>
          <th>Team</th>
          <th>GP</th><th>W</th><th>L</th><th>OT</th>
          <th>PTS</th><th>P%</th>
          <th>GF</th><th>GA</th>
          <th>STK</th><th>L10</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// PLAYOFF BRACKET
// ═══════════════════════════════════════════════════════════
async function loadPlayoff() {
  try {
    const season = '20242025';
    const data = await fetchNHL(`/playoff-bracket/${season}`);
    renderPlayoffBracket(data);
    playoffLoaded = true;
  } catch(e) {
    // Try fallback with standings-based projection
    try {
      const standingsData = await fetchNHL('/standings/now');
      renderPlayoffProjection(standingsData.standings || []);
      playoffLoaded = true;
    } catch(e2) {
      document.getElementById('playoffContainer').innerHTML = `<div class="error-msg">⚠️ Could not load playoff data. ${e2.message}</div>`;
    }
  }
}

function renderPlayoffBracket(data) {
  // Build from API bracket data
  const series = data.series || [];
  if (!series.length) {
    renderPlayoffProjection([]);
    return;
  }

  // Group by round
  const rounds = {};
  for (const s of series) {
    const r = s.seriesLetter || s.round || '?';
    if (!rounds[r]) rounds[r] = [];
    rounds[r].push(s);
  }

  let html = `
    <div class="bracket-title">🏆 STANLEY CUP PLAYOFFS</div>
    <div class="bracket-subtitle">2024–2025 Season · As of Today</div>
  `;

  // East / West brackets
  const eastSeries = series.filter(s => s.conferenceName === 'Eastern' || s.conference === 'Eastern');
  const westSeries = series.filter(s => s.conferenceName === 'Western' || s.conference === 'Western');
  const finalSeries = series.filter(s => !s.conferenceName && s.round === 4);

  html += `<div class="conference-bracket">
    <div class="conference-label">Eastern Conference</div>
    ${buildSeriesGrid(eastSeries)}
  </div>
  <div class="conference-bracket">
    <div class="conference-label">Western Conference</div>
    ${buildSeriesGrid(westSeries)}
  </div>`;

  if (finalSeries.length) {
    html += `<div class="stanley-cup-section">
      <div class="cup-label">🏆 Stanley Cup Final</div>
      <div class="cup-matchup">${buildMatchupCard(finalSeries[0])}</div>
    </div>`;
  }

  document.getElementById('playoffContainer').innerHTML = html;
}

function buildSeriesGrid(seriesList) {
  if (!seriesList.length) return '<div style="color:var(--text-dim);font-size:0.85rem;padding:12px">No series data available yet.</div>';

  const byRound = {};
  for (const s of seriesList) {
    const r = s.round || 1;
    if (!byRound[r]) byRound[r] = [];
    byRound[r].push(s);
  }

  const roundNames = { 1: 'Round 1', 2: 'Second Round', 3: 'Conf. Final', 4: 'Stanley Cup Final' };

  let html = '<div class="bracket-grid">';
  const rounds = Object.keys(byRound).sort();
  for (const r of rounds) {
    html += `<div class="bracket-round">
      <div class="bracket-round-label">${roundNames[r] || 'Round ' + r}</div>
      ${byRound[r].map(buildMatchupCard).join('')}
    </div>`;
  }
  html += '</div>';
  return html;
}

function buildMatchupCard(s) {
  const top = s.topSeedTeam;
  const bot = s.bottomSeedTeam;

  if (!top && !bot) {
    return `<div class="matchup tbd">
      <div class="matchup-team">TBD</div>
      <div class="matchup-team">TBD</div>
    </div>`;
  }

  const topWins = s.topSeedWins ?? 0;
  const botWins = s.bottomSeedWins ?? 0;
  const maxWins = 4;
  const topWon = topWins === maxWins;
  const botWon = botWins === maxWins;

  const topLogoHtml = top?.logo
    ? `<img class="matchup-logo" src="${top.logo}" alt="${top.abbrev}" onerror="this.style.display='none'">`
    : '';
  const botLogoHtml = bot?.logo
    ? `<img class="matchup-logo" src="${bot.logo}" alt="${bot.abbrev}" onerror="this.style.display='none'">`
    : '';

  let statusText = '';
  if (topWon) statusText = `${top?.abbrev} wins ${maxWins}-${botWins}`;
  else if (botWon) statusText = `${bot?.abbrev} wins ${maxWins}-${topWins}`;
  else if (topWins > 0 || botWins > 0) statusText = `Series ${topWins}-${botWins}`;
  else statusText = 'Series not started';

  const isActive = !topWon && !botWon && (topWins > 0 || botWins > 0);

  return `<div class="matchup">
    <div class="matchup-team ${topWon ? 'winner' : botWon ? 'eliminated' : ''}">
      <span class="matchup-seed">${top?.seed ?? '?'}</span>
      ${topLogoHtml}
      <span>${top?.abbrev ?? 'TBD'}</span>
      <span class="matchup-wins ${topWins === maxWins ? 'max' : ''}">${topWins}</span>
    </div>
    <div class="matchup-team ${botWon ? 'winner' : topWon ? 'eliminated' : ''}">
      <span class="matchup-seed">${bot?.seed ?? '?'}</span>
      ${botLogoHtml}
      <span>${bot?.abbrev ?? 'TBD'}</span>
      <span class="matchup-wins ${botWins === maxWins ? 'max' : ''}">${botWins}</span>
    </div>
    <div class="series-status ${isActive ? 'active' : ''}">${statusText}</div>
  </div>`;
}

function renderPlayoffProjection(standings) {
  // Project playoff picture from current standings
  const divMap = { Atlantic: [], Metropolitan: [], Central: [], Pacific: [] };
  for (const t of standings) {
    if (divMap[t.divisionName]) divMap[t.divisionName].push(t);
  }
  for (const d of Object.values(divMap)) d.sort((a,b) => b.points - a.points);

  const eastDiv1 = (divMap['Atlantic'] || []).slice(0,3);
  const eastDiv2 = (divMap['Metropolitan'] || []).slice(0,3);
  const eastWC = [...(divMap['Atlantic']||[]).slice(3), ...(divMap['Metropolitan']||[]).slice(3)]
    .sort((a,b) => b.points - a.points).slice(0,2);

  const westDiv1 = (divMap['Central'] || []).slice(0,3);
  const westDiv2 = (divMap['Pacific'] || []).slice(0,3);
  const westWC = [...(divMap['Central']||[]).slice(3), ...(divMap['Pacific']||[]).slice(3)]
    .sort((a,b) => b.points - a.points).slice(0,2);

  const buildSeedRow = (seed, team) => {
    if (!team) return `<div class="matchup-team"><span class="matchup-seed">${seed}</span><span style="color:var(--text-dim)">TBD</span></div>`;
    const logoHtml = team.teamLogo ? `<img class="matchup-logo" src="${team.teamLogo}" alt="${team.teamAbbrev?.default}" onerror="this.style.display='none'">` : '';
    return `<div class="matchup-team">
      <span class="matchup-seed">${seed}</span>
      ${logoHtml}
      <span>${team.teamAbbrev?.default || ''}</span>
      <span style="margin-left:auto;font-size:0.7rem;color:var(--text-dim)">${team.points}pts</span>
    </div>`;
  };

  const buildProjected = (seeds) => {
    const pairs = [[0,7],[3,4],[2,5],[1,6]]; // classic playoff seeding
    return pairs.map(([a,b]) => `<div class="matchup">
      ${buildSeedRow(a+1, seeds[a])}
      ${buildSeedRow(b+1, seeds[b])}
      <div class="series-status">Projected matchup</div>
    </div>`).join('');
  };

  const eastSeeds = [eastDiv1[0], eastDiv1[1], eastDiv2[0], eastWC[0], eastWC[1], eastDiv2[1], eastDiv1[2], eastDiv2[2]];
  const westSeeds = [westDiv1[0], westDiv1[1], westDiv2[0], westWC[0], westWC[1], westDiv2[1], westDiv1[2], westDiv2[2]];

  const html = `
    <div class="bracket-title">🏆 PLAYOFF PICTURE</div>
    <div class="bracket-subtitle">Projected based on current standings · 2024–2025 Season</div>
    <div class="conference-bracket">
      <div class="conference-label">Eastern Conference</div>
      <div class="bracket-grid">
        <div class="bracket-round">
          <div class="bracket-round-label">Round 1 (Projected)</div>
          ${buildProjected(eastSeeds)}
        </div>
      </div>
    </div>
    <div class="conference-bracket">
      <div class="conference-label">Western Conference</div>
      <div class="bracket-grid">
        <div class="bracket-round">
          <div class="bracket-round-label">Round 1 (Projected)</div>
          ${buildProjected(westSeeds)}
        </div>
      </div>
    </div>
  `;
  document.getElementById('playoffContainer').innerHTML = html;
}
