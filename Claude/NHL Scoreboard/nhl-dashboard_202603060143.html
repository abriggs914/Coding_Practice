// PLAYOFF BRACKET — Interactive Tree
// ═══════════════════════════════════════════════════════════

// bracketState[slotId] = { top, bot, topWins, botWins, winner, userPick, live, seriesLabel }
// slotId format: "W-R1-0", "E-R2-1", "CUP"
let bracketState = {};
let rawSeriesData = [];   // from API
let useProjection = false;

async function loadPlayoff() {
  try {
    const season = '20242025';
    const data = await fetchNHL(`/playoff-bracket/${season}`);
    rawSeriesData = data.series || [];
    if (!rawSeriesData.length) throw new Error('no series');
    initBracketFromAPI(rawSeriesData);
    playoffLoaded = true;
  } catch(e) {
    try {
      const standingsData = await fetchNHL('/standings/now');
      useProjection = true;
      initBracketFromStandings(standingsData.standings || []);
      playoffLoaded = true;
    } catch(e2) {
      document.getElementById('playoffContainer').innerHTML = `<div class="error-msg">⚠️ Could not load playoff data. ${e2.message}</div>`;
    }
  }
}

// ── Build state from live API data ──────────────────────────
function initBracketFromAPI(series) {
  bracketState = {};

  // Split by conference and round
  const westSeries = series.filter(s => s.conferenceName === 'Western' || s.conference === 'Western');
  const eastSeries = series.filter(s => s.conferenceName === 'Eastern' || s.conference === 'Eastern');
  const finalSeries = series.find(s => s.round === 4 && !s.conferenceName) || series.find(s => s.round === 4);

  const pushSlots = (conf, confSeries) => {
    // Sort each round's series by their seriesCode or seed order
    for (let r = 1; r <= 3; r++) {
      const roundSeries = confSeries.filter(s => s.round === r)
        .sort((a,b) => (a.seriesCode || a.topSeedTeam?.seed || 0) - (b.seriesCode || b.topSeedTeam?.seed || 0));
      roundSeries.forEach((s, i) => {
        const id = `${conf}-R${r}-${i}`;
        const topW = s.topSeedWins ?? 0;
        const botW = s.bottomSeedWins ?? 0;
        const done = topW === 4 || botW === 4;
        bracketState[id] = {
          top: teamFromAPI(s.topSeedTeam),
          bot: teamFromAPI(s.bottomSeedTeam),
          topWins: topW,
          botWins: botW,
          winner: done ? (topW === 4 ? 'top' : 'bot') : null,
          userPick: null,
          live: !done && (topW > 0 || botW > 0),
          seriesLabel: s.seriesLetter || ''
        };
      });
    }
  };

  pushSlots('W', westSeries);
  pushSlots('E', eastSeries);

  // Final
  if (finalSeries) {
    const topW = finalSeries.topSeedWins ?? 0;
    const botW = finalSeries.bottomSeedWins ?? 0;
    const done = topW === 4 || botW === 4;
    bracketState['CUP'] = {
      top: teamFromAPI(finalSeries.topSeedTeam),
      bot: teamFromAPI(finalSeries.bottomSeedTeam),
      topWins: topW,
      botWins: botW,
      winner: done ? (topW === 4 ? 'top' : 'bot') : null,
      userPick: null,
      live: !done && (topW > 0 || botW > 0)
    };
  } else {
    bracketState['CUP'] = emptySlot();
  }

  // Fill later rounds from winners if API gave us that data
  propagateWinners();
  renderBracket();
}

function teamFromAPI(t) {
  if (!t) return null;
  return {
    abbrev: t.abbrev || t.teamAbbrev || '?',
    logo: t.logo || t.teamLogo || '',
    seed: t.seed ?? null,
    name: t.name || t.teamName || t.abbrev || '?'
  };
}

// ── Build state from standings projection ───────────────────
function initBracketFromStandings(standings) {
  bracketState = {};
  const divMap = { Atlantic:[], Metropolitan:[], Central:[], Pacific:[] };
  for (const t of standings) { if (divMap[t.divisionName]) divMap[t.divisionName].push(t); }
  for (const d of Object.values(divMap)) d.sort((a,b) => b.points - a.points);

  const mkTeam = (t, seed) => t ? { abbrev: t.teamAbbrev?.default||'?', logo: t.teamLogo||'', seed, name: t.teamName?.default||'', points: t.points||0 } : null;

  // West: Central and Pacific top 3, then WC from remaining
  const cTop = divMap['Central'].slice(0,3);
  const pTop = divMap['Pacific'].slice(0,3);
  const wWC = [...divMap['Central'].slice(3), ...divMap['Pacific'].slice(3)].sort((a,b)=>b.points-a.points).slice(0,2);
  // wWC[0] = WC1 (stronger), wWC[1] = WC2 (weaker)

  const c1pts = cTop[0]?.points||0, p1pts = pTop[0]?.points||0;
  const pacificIsWestSeed1 = p1pts >= c1pts;

  // User-specified order top-to-bottom on left side:
  //   slot0: P1 vs WC2 (if Pacific is #1 west seed) else P1 vs WC1
  //   slot1: P2 vs P3
  //   slot2: C2 vs C3
  //   slot3: C1 vs WC1 (if Pacific is #1 west seed) else C1 vs WC2
  let westR1;
  if (pacificIsWestSeed1) {
    westR1 = [
      { top: mkTeam(pTop[0], 1), bot: mkTeam(wWC[1], 8) },  // P1 vs WC2
      { top: mkTeam(pTop[1], 3), bot: mkTeam(pTop[2], 6) },  // P2 vs P3
      { top: mkTeam(cTop[1], 4), bot: mkTeam(cTop[2], 7) },  // C2 vs C3
      { top: mkTeam(cTop[0], 2), bot: mkTeam(wWC[0], 5) },   // C1 vs WC1
    ];
  } else {
    // Central is west seed 1
    westR1 = [
      { top: mkTeam(pTop[0], 2), bot: mkTeam(wWC[0], 5) },   // P1 vs WC1
      { top: mkTeam(pTop[1], 3), bot: mkTeam(pTop[2], 6) },   // P2 vs P3
      { top: mkTeam(cTop[1], 4), bot: mkTeam(cTop[2], 7) },   // C2 vs C3
      { top: mkTeam(cTop[0], 1), bot: mkTeam(wWC[1], 8) },    // C1 vs WC2
    ];
  }

  // East: Atlantic and Metropolitan top 3, then WC
  const aTop = divMap['Atlantic'].slice(0,3);
  const mTop = divMap['Metropolitan'].slice(0,3);
  const eWC = [...divMap['Atlantic'].slice(3), ...divMap['Metropolitan'].slice(3)].sort((a,b)=>b.points-a.points).slice(0,2);
  const a1pts = aTop[0]?.points||0, m1pts = mTop[0]?.points||0;
  const atlanticIsEastSeed1 = a1pts >= m1pts;

  // Mirror of west: top-to-bottom on right (East) side:
  //   slot0: A1 vs WC2 (if Atlantic is #1) else A1 vs WC1
  //   slot1: A2 vs A3
  //   slot2: M2 vs M3
  //   slot3: M1 vs WC1 (if Atlantic is #1) else M1 vs WC2
  let eastR1;
  if (atlanticIsEastSeed1) {
    eastR1 = [
      { top: mkTeam(aTop[0], 1), bot: mkTeam(eWC[1], 8) },  // A1 vs WC2
      { top: mkTeam(aTop[1], 3), bot: mkTeam(aTop[2], 6) },  // A2 vs A3
      { top: mkTeam(mTop[1], 4), bot: mkTeam(mTop[2], 7) },  // M2 vs M3
      { top: mkTeam(mTop[0], 2), bot: mkTeam(eWC[0], 5) },   // M1 vs WC1
    ];
  } else {
    eastR1 = [
      { top: mkTeam(mTop[0], 1), bot: mkTeam(eWC[1], 8) },   // M1 vs WC2
      { top: mkTeam(mTop[1], 3), bot: mkTeam(mTop[2], 6) },   // M2 vs M3
      { top: mkTeam(aTop[1], 4), bot: mkTeam(aTop[2], 7) },   // A2 vs A3
      { top: mkTeam(aTop[0], 2), bot: mkTeam(eWC[0], 5) },    // A1 vs WC1
    ];
  }

  const allR1 = { W: westR1, E: eastR1 };
  ['W','E'].forEach(conf => {
    allR1[conf].forEach((m, i) => {
      bracketState[`${conf}-R1-${i}`] = { top:m.top, bot:m.bot, topWins:0, botWins:0, winner:null, userPick:null, live:false };
    });
    for (let r = 2; r <= 3; r++) {
      const count = r === 2 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        bracketState[`${conf}-R${r}-${i}`] = emptySlot();
      }
    }
  });
  bracketState['CUP'] = emptySlot();
  renderBracket();
}

function emptySlot() {
  return { top:null, bot:null, topWins:0, botWins:0, winner:null, userPick:null, live:false };
}

// ── Propagate API winners into subsequent rounds ─────────────
function propagateWinners() {
  ['W','E'].forEach(conf => {
    // R1 winners feed R2
    for (let i = 0; i < 4; i++) {
      const slot = bracketState[`${conf}-R1-${i}`];
      if (!slot?.winner) continue;
      const winner = slot.winner === 'top' ? slot.top : slot.bot;
      const r2idx = Math.floor(i / 2);
      const r2slot = bracketState[`${conf}-R2-${r2idx}`];
      if (!r2slot) continue;
      if (i % 2 === 0) r2slot.top = r2slot.top || winner;
      else r2slot.bot = r2slot.bot || winner;
    }
    // R2 winners feed R3
    for (let i = 0; i < 2; i++) {
      const slot = bracketState[`${conf}-R2-${i}`];
      if (!slot?.winner) continue;
      const winner = slot.winner === 'top' ? slot.top : slot.bot;
      const r3slot = bracketState[`${conf}-R3-0`];
      if (!r3slot) continue;
      if (i === 0) r3slot.top = r3slot.top || winner;
      else r3slot.bot = r3slot.bot || winner;
    }
    // R3 winner feeds CUP
    const cfSlot = bracketState[`${conf}-R3-0`];
    if (cfSlot?.winner) {
      const winner = cfSlot.winner === 'top' ? cfSlot.top : cfSlot.bot;
      if (conf === 'W') bracketState['CUP'].top = bracketState['CUP'].top || winner;
      else bracketState['CUP'].bot = bracketState['CUP'].bot || winner;
    }
  });
}

// ── User picks a winner ──────────────────────────────────────
function pickWinner(slotId, side) {
  const slot = bracketState[slotId];
  if (!slot) return;
  // Only allow picking if the team exists and slot not already officially decided
  const team = side === 'top' ? slot.top : slot.bot;
  if (!team) return;
  if (slot.winner) return; // API says it's done, no overriding

  // Toggle: clicking same pick removes it
  if (slot.userPick === side) {
    slot.userPick = null;
    // Remove downstream picks that depended on this
    clearDownstream(slotId, side);
  } else {
    const prevPick = slot.userPick;
    slot.userPick = side;
    if (prevPick) clearDownstream(slotId, prevPick);
    // Advance winner to next round
    advanceUserPick(slotId, team);
  }
  renderBracket();
}

function advanceUserPick(slotId, team) {
  if (slotId === 'CUP') return; // CUP is the final destination, nothing to advance to
  const parts = slotId.split('-');
  const conf = parts[0];
  const round = parseInt(parts[1].replace('R',''));
  const idx = parseInt(parts[2]);

  let nextId, nextSide;
  if (round === 1) {
    nextId = `${conf}-R2-${Math.floor(idx/2)}`;
    nextSide = idx % 2 === 0 ? 'top' : 'bot';
  } else if (round === 2) {
    nextId = `${conf}-R3-0`;
    nextSide = idx === 0 ? 'top' : 'bot';
  } else if (round === 3) {
    nextId = 'CUP';
    nextSide = conf === 'W' ? 'top' : 'bot';
  } else { return; }

  const nextSlot = bracketState[nextId];
  if (!nextSlot) return;
  if (nextSide === 'top') nextSlot.top = team;
  else nextSlot.bot = team;
}

function clearDownstream(slotId, side) {
  if (slotId === 'CUP') return; // nothing downstream of CUP
  const parts = slotId.split('-');
  const conf = parts[0];
  const round = parseInt(parts[1].replace('R',''));
  const idx = parseInt(parts[2]);

  let nextId, nextSide;
  if (round === 1) {
    nextId = `${conf}-R2-${Math.floor(idx/2)}`;
    nextSide = idx % 2 === 0 ? 'top' : 'bot';
  } else if (round === 2) {
    nextId = `${conf}-R3-0`;
    nextSide = idx === 0 ? 'top' : 'bot';
  } else if (round === 3) {
    nextId = 'CUP';
    nextSide = conf === 'W' ? 'top' : 'bot';
  } else { return; }

  const nextSlot = bracketState[nextId];
  if (!nextSlot) return;
  if (!nextSlot.winner) {
    if (nextSide === 'top') nextSlot.top = null;
    else nextSlot.bot = null;
    if (nextSlot.userPick) {
      clearDownstream(nextId, nextSlot.userPick);
      nextSlot.userPick = null;
    }
  }
}

function resetBracket() {
  bracketTiebreaker = '';
  // Clear all user picks and re-init
  if (useProjection) {
    for (const id in bracketState) {
      const s = bracketState[id];
      s.userPick = null;
      if (id.includes('R2') || id.includes('R3') || id === 'CUP') {
        s.top = null; s.bot = null;
      }
    }
    // Re-seed R1 teams (they are already in R1 slots)
  } else {
    initBracketFromAPI(rawSeriesData);
    return;
  }
  renderBracket();
}

let bracketTiebreaker = '';

// ── Render ──────────────────────────────────────────────────
function renderBracket() {
  const roundNames = {1:'Round 1', 2:'Second Round', 3:'Conf. Final'};
  const subtitle = useProjection ? 'Projected from current standings · Click a team to pick winners' : '2024–2025 Season · Click a team to pick winners';

  const buildRoundCol = (conf, round, slots) => {
    const slotDivs = slots.map(([id, slot]) => {
      return `<div class="bracket-slot">${buildMatchup(id, slot, conf, round)}</div>`;
    }).join('');
    return `<div class="bracket-round-col">
      <div class="round-label">${roundNames[round] || 'Round '+round}</div>
      <div class="round-slots">${slotDivs}</div>
    </div>`;
  };

  const buildConf = (conf) => {
    const cols = [];
    for (let r = 1; r <= 3; r++) {
      const slots = [];
      const count = r === 1 ? 4 : r === 2 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        const id = `${conf}-R${r}-${i}`;
        slots.push([id, bracketState[id] || emptySlot()]);
      }
      cols.push(buildRoundCol(conf, r, slots));
    }
    return cols.join('');
  };

  const cupSlot = bracketState['CUP'] || emptySlot();
  const champion = cupSlot.winner ? (cupSlot.winner === 'top' ? cupSlot.top : cupSlot.bot)
                 : (cupSlot.userPick ? (cupSlot.userPick === 'top' ? cupSlot.top : cupSlot.bot) : null);

  // Check if all picks are filled (needed for export)
  const allPicksFilled = checkAllFilled();
  const tbFilled = bracketTiebreaker !== '' && /^\d+$/.test(bracketTiebreaker.trim());
  const canExport = allPicksFilled && tbFilled && champion;

  const tiebreakerHtml = champion ? `
    <div class="tiebreaker-section">
      <div class="tiebreaker-label">Total goals in Championship:</div>
      <input
        class="tiebreaker-input"
        type="number"
        min="0"
        placeholder="e.g. 24"
        value="${bracketTiebreaker}"
        oninput="bracketTiebreaker = this.value.replace(/[^0-9]/g,''); this.value = bracketTiebreaker; checkExportBtn()"
        onkeydown="if(event.key==='-'||event.key==='.')event.preventDefault()"
      >
    </div>` : '';

  const champHtml = champion ? `
    <div class="champion-display">
      <div class="champ-label">🏆 Champion</div>
      ${champion.logo ? `<img src="${champion.logo}" onerror="this.style.display='none'">` : ''}
      <div class="champ-team">${champion.abbrev}</div>
    </div>
    ${tiebreakerHtml}
    <button id="exportBtn" class="export-btn${canExport ? '' : ' export-disabled'}" onclick="exportBracket()" ${canExport ? '' : 'disabled'}>
      ⬇ Export Bracket
    </button>` : '';

  const html = `
    <div class="bracket-page">
      <div class="bracket-header">
        <h1>🏒 Stanley Cup Playoffs</h1>
        <p>${subtitle}</p>
        <button class="bracket-reset-btn" onclick="resetBracket()">↺ Reset Picks</button>
      </div>
      <div class="conf-label-row">
        <div class="conf-label-west">Western Conference</div>
        <div class="conf-label-center"></div>
        <div class="conf-label-east">Eastern Conference</div>
      </div>
      <div class="bracket-outer">
        <div class="bracket-conference west">${buildConf('W')}</div>
        <div class="bracket-final-col">
          <div class="final-label">Stanley Cup<br>Final</div>
          ${buildMatchup('CUP', cupSlot, 'CUP', 4)}
          ${champHtml}
        </div>
        <div class="bracket-conference east">${buildConf('E')}</div>
      </div>
    </div>`;

  document.getElementById('playoffContainer').innerHTML = html;
}

function checkAllFilled() {
  const ids = [];
  ['W','E'].forEach(c => {
    for (let r = 1; r <= 3; r++) {
      const count = r === 1 ? 4 : r === 2 ? 2 : 1;
      for (let i = 0; i < count; i++) ids.push(`${c}-R${r}-${i}`);
    }
  });
  ids.push('CUP');
  return ids.every(id => {
    const s = bracketState[id];
    return s && (s.winner || s.userPick);
  });
}

function checkExportBtn() {
  const allFilled = checkAllFilled();
  const tbFilled = bracketTiebreaker !== '' && /^\d+$/.test(bracketTiebreaker.trim());
  const cupSlot = bracketState['CUP'] || emptySlot();
  const champion = cupSlot.winner || cupSlot.userPick;
  const btn = document.getElementById('exportBtn');
  if (!btn) return;
  const can = allFilled && tbFilled && champion;
  btn.disabled = !can;
  btn.classList.toggle('export-disabled', !can);
}

function exportBracket() {
  const picks = {};
  for (const [id, slot] of Object.entries(bracketState)) {
    const effective = slot.winner || slot.userPick;
    if (!effective) continue;
    const winner = effective === 'top' ? slot.top : slot.bot;
    picks[id] = {
      winner: winner?.abbrev,
      source: slot.winner ? 'official' : 'predicted',
      topWins: slot.topWins,
      botWins: slot.botWins,
    };
  }
  const cupSlot = bracketState['CUP'] || emptySlot();
  const champion = (cupSlot.winner || cupSlot.userPick) === 'top' ? cupSlot.top : cupSlot.bot;

  const payload = {
    exportedAt: new Date().toISOString(),
    season: '2024-2025',
    champion: champion?.abbrev,
    tiebreakerTotalGoals: parseInt(bracketTiebreaker, 10),
    picks
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nhl-bracket-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function buildMatchup(id, slot, conf, round) {
  if (!slot) slot = emptySlot();
  const { top, bot, topWins, botWins, winner, userPick, live } = slot;

  const maxW = 4;
  const topDone = winner === 'top';
  const botDone = winner === 'bot';
  const effectiveWinner = winner || userPick;

  const teamRow = (side, team, wins) => {
    if (!team) {
      return `<div class="b-team tbd"><span class="b-abbrev">TBD</span></div>`;
    }
    const isWinner = effectiveWinner === side;
    const isLoser = effectiveWinner && effectiveWinner !== side;
    const isUserPick = !winner && userPick === side;
    const isOfficialWin = winner === side;
    const canPick = !winner && team; // user can pick if no official winner

    let cls = 'b-team';
    if (isOfficialWin) cls += ' winner';
    else if (isLoser && winner) cls += ' loser';
    else if (isUserPick) cls += ' user-pick';
    else if (canPick) cls += ' pickable';

    const winsDisplay = wins > 0 ? wins : '';
    const winsCls = wins === maxW ? 'b-wins champion' : wins > 0 && wins > (side==='top'?botWins:topWins) ? 'b-wins leading' : 'b-wins';

    const logoHtml = team.logo ? `<img class="b-logo" src="${team.logo}" onerror="this.style.display='none'">` : '';
    const seedHtml = team.seed ? `<span class="b-seed">${team.seed}</span>` : '';
    const clickAttr = canPick ? `onclick="pickWinner('${id}','${side}')"` : '';

    return `<div class="${cls}" ${clickAttr}>
      ${seedHtml}${logoHtml}
      <span class="b-abbrev">${team.abbrev}</span>
      <span class="${winsCls}">${winsDisplay}</span>
    </div>`;
  };

  // Series status bar
  let barText = '';
  let barCls = 'b-series-bar';
  if (winner === 'top') barText = `${top?.abbrev} wins 4-${botWins}`;
  else if (winner === 'bot') barText = `${bot?.abbrev} wins 4-${topWins}`;
  else if (live) { barText = `Series ${topWins}-${botWins}`; barCls += ' live-bar'; }
  else if (userPick) barText = `Predicted: ${effectiveWinner==='top'?top?.abbrev:bot?.abbrev}`;
  else if (top && bot) barText = 'Click to predict';
  else barText = 'Awaiting teams';

  const liveCls = live ? ' series-live' : winner ? ' series-done' : '';

  return `<div class="b-matchup${liveCls}">
    ${teamRow('top', top, topWins)}
    ${teamRow('bot', bot, botWins)}
    <div class="${barCls}">${barText}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// GAME DETAIL PANEL
// ═══════════════════════════════════════════════════════════
async function selectGame(gameId, gameFromFeed) {
  // Toggle off if same game clicked again
  if (selectedGameId === gameId) {
    closeGameDetail();
    return;
  }

  // Update selection state
  selectedGameId = gameId;
  document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.game-card[data-game-id="${gameId}"]`);
  if (card) card.classList.add('selected');

  // Show panel with loading state
  const panel = document.getElementById('gameDetailPanel');
  const title = document.getElementById('detailTitle');
  const body  = document.getElementById('detailBody');
  const away  = gameFromFeed.awayTeam;
  const home  = gameFromFeed.homeTeam;
  title.textContent = `${away.abbrev} @ ${home.abbrev}`;
  body.innerHTML = '<div class="detail-loading"><div class="spinner"></div><span>Loading game details…</span></div>';
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  try {
    // Use cache if we recently fetched this game's landing
    let landing = selectedGameCache[gameId];
    if (!landing) {
      landing = await fetchNHL(`/gamecenter/${gameId}/landing`);
      selectedGameCache[gameId] = landing;
    }
    if (selectedGameId !== gameId) return; // user changed selection while fetching
    renderGameDetail(landing, gameFromFeed);
  } catch(e) {
    if (selectedGameId !== gameId) return;
    body.innerHTML = `<div class="error-msg">⚠️ Could not load game details. ${e.message}</div>`;
  }
}

function closeGameDetail() {
  selectedGameId = null;
  document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
  const panel = document.getElementById('gameDetailPanel');
  panel.classList.remove('open');
}

function renderGameDetail(landing, feedGame) {
  const body  = document.getElementById('detailBody');
  const state = landing.gameState || feedGame.gameState;
  const isLive  = state === 'LIVE' || state === 'CRIT';
  const isFinal = state === 'FINAL' || state === 'OFF';
  const isPre   = state === 'FUT'   || state === 'PRE';

  const away = landing.awayTeam || feedGame.awayTeam;
  const home = landing.homeTeam || feedGame.homeTeam;
  const awayAbbr = away.abbrev;
  const homeAbbr = home.abbrev;
  const season = '20252026';

  const headshot = (playerId, teamAbbr) => {
    if (!playerId) return `<div class="comp-headshot-placeholder"></div>`;
    const url = `https://assets.nhle.com/mugs/nhl/${season}/${teamAbbr}/${playerId}.png`;
    return `<img class="comp-headshot" src="${url}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" alt=""><div class="comp-headshot-placeholder" style="display:none"></div>`;
  };

  const statBadge = (val, label) =>
    `<div class="comp-stat"><div class="comp-stat-val">${val ?? '—'}</div><div class="comp-stat-label">${label}</div></div>`;

  let html = '';

  // ── 1. SKATER + GOALIE COMPARISON (pre-game or always) ────────────────
  const matchup = landing.matchup;
  if (matchup) {
    const renderCompSide = (leader, teamAbbr, statKeys) => {
      if (!leader) return `<div class="comparison-side"><div style="color:var(--text-dim);font-size:0.8rem;padding:16px">No data</div></div>`;
      const name = leader.name?.default || '?';
      const pos  = leader.position || '';
      return `<div class="comparison-side">
        <div class="comp-player-head">
          ${headshot(leader.playerId, teamAbbr)}
          <div>
            <div class="comp-player-name">${name}</div>
            <div class="comp-player-pos">${[teamAbbr, pos].filter(Boolean).join(' · ')}</div>
          </div>
        </div>
        <div class="comp-stats">
          ${statKeys.map(([k,l]) => statBadge(leader[k], l)).join('')}
        </div>
      </div>`;
    };

    const skaterStats = [['points','PTS'],['goals','G'],['assists','A']];
    const goalieStats = [['gaa','GAA'],['savePctg','SV%']];

    const sk = matchup.skaterComparison;
    const gk = matchup.goalieComparison;

    if (sk) {
      html += `<div class="detail-section-label">⛸ Skater Matchup</div>
        <div class="detail-team-labels">
          <span>${awayAbbr}</span><span>${homeAbbr}</span>
        </div>
        <div class="comparison-grid">
          ${renderCompSide(sk.awayLeader, awayAbbr, skaterStats)}
          ${renderCompSide(sk.homeLeader, homeAbbr, skaterStats)}
        </div>`;
    }
    if (gk) {
      html += `<div class="detail-section-label">🥅 Goalie Matchup</div>
        <div class="detail-team-labels">
          <span>${awayAbbr}</span><span>${homeAbbr}</span>
        </div>
        <div class="comparison-grid">
          ${renderCompSide(gk.awayLeader, awayAbbr, goalieStats)}
          ${renderCompSide(gk.homeLeader, homeAbbr, goalieStats)}
        </div>`;
    }
  }

  // ── 2. BOX SCORE — scoring by period ──────────────────────────────────
  const linescore = landing.summary?.linescore;
  if (linescore?.byPeriod?.length) {
    const periods = linescore.byPeriod;
    const totAway = linescore.totals?.away ?? '';
    const totHome = linescore.totals?.home ?? '';

    const perHeaders = periods.map(p => {
      const n = p.periodDescriptor?.number;
      const t = p.periodDescriptor?.periodType;
      return `<th>${t === 'OT' ? 'OT' : t === 'SO' ? 'SO' : n}</th>`;
    }).join('');
    const awayPer = periods.map(p => `<td>${p.away ?? '—'}</td>`).join('');
    const homePer = periods.map(p => `<td>${p.home ?? '—'}</td>`).join('');

    html += `<div class="detail-section-label">📋 Linescore</div>
      <div class="detail-linescore-wrap">
        <table class="detail-linescore">
          <thead><tr><th>Team</th>${perHeaders}<th class="ls-tot">T</th></tr></thead>
          <tbody>
            <tr><td class="ls-team">${awayAbbr}</td>${awayPer}<td class="ls-tot">${totAway}</td></tr>
            <tr><td class="ls-team">${homeAbbr}</td>${homePer}<td class="ls-tot">${totHome}</td></tr>
          </tbody>
        </table>
      </div>`;
  }

  // ── 3. SCORING SUMMARY ────────────────────────────────────────────────
  const scoringPlays = landing.summary?.scoring;
  if (scoringPlays?.length) {
    const periodGroups = {};
    for (const period of scoringPlays) {
      const pd = period.periodDescriptor;
      const n  = pd?.number;
      const t  = pd?.periodType;
      const label = t === 'OT' ? 'Overtime' : t === 'SO' ? 'Shootout' : `Period ${n}`;
      const goals = period.goals || [];
      if (!goals.length) continue;

      const rows = goals.map(gl => {
        const scorer    = gl.name?.default || '?';
        const teamA     = gl.teamAbbrev?.default || '';
        const time      = gl.timeInPeriod || '';
        const strength  = gl.strength && gl.strength !== 'ev' ? `<span class="s-strength" style="font-size:0.58rem">${gl.strength.toUpperCase()}</span>` : '';
        const assists   = (gl.assists || []).map(a => a.name?.default?.split(' ').slice(-1)[0]).join(', ');
        const awayG     = gl.awayScore ?? '';
        const homeG     = gl.homeScore ?? '';
        const score     = awayG !== '' ? `${awayAbbr} ${awayG}–${homeAbbr} ${homeG}` : '';
        const hlUrl     = gl.highlightClipSharingUrl || '';
        const hlBtn     = hlUrl ? `<button class="highlight-btn" onclick="openVideoModal(event,'${hlUrl.replace(/'/g,"\\'")}','${scorer.replace(/'/g,"\\'")}')">▶</button>` : '';
        return `<tr>
          <td class="sg-time">${time}</td>
          <td><span style="color:var(--accent);font-weight:700">${teamA}</span> ${strength}</td>
          <td class="sg-scorer">${scorer}${assists ? `<div class="sg-assists">${assists}</div>` : ''}</td>
          <td class="sg-score">${score}</td>
          <td>${hlBtn}</td>
        </tr>`;
      }).join('');

      periodGroups[label] = rows;
    }

    if (Object.keys(periodGroups).length) {
      html += `<div class="detail-section-label">🚨 Scoring Summary</div>`;
      for (const [label, rows] of Object.entries(periodGroups)) {
        html += `<div class="sg-period-label">${label}</div>
          <table class="detail-scoring-table"><tbody>${rows}</tbody></table>`;
      }
    }
  }

  // ── 4. PENALTY SUMMARY ────────────────────────────────────────────────
  const penaltyPlays = landing.summary?.penalties;
  if (penaltyPlays?.length) {
    const penRows = [];
    for (const period of penaltyPlays) {
      const pd    = period.periodDescriptor;
      const n     = pd?.number;
      const t     = pd?.periodType;
      const pLabel = t === 'OT' ? 'OT' : t === 'SO' ? 'SO' : `P${n}`;
      for (const pen of (period.penalties || [])) {
        const player  = pen.committedByPlayer || '—';
        const teamA   = pen.teamAbbrev?.default || '';
        const type    = pen.descKey || pen.type || '—';
        const mins    = pen.duration != null ? `${pen.duration} min` : '';
        const time    = pen.timeInPeriod || '';
        penRows.push(`<tr>
          <td class="sg-time">${pLabel} ${time}</td>
          <td><span style="color:var(--accent);font-weight:700">${teamA}</span></td>
          <td class="sg-scorer">${player}</td>
          <td style="color:var(--text-dim);font-size:0.75rem">${type}</td>
          <td style="font-family:'Roboto Mono',monospace;font-size:0.75rem">${mins}</td>
        </tr>`);
      }
    }
    if (penRows.length) {
      html += `<div class="detail-section-label">🚩 Penalties</div>
        <table class="detail-scoring-table"><tbody>${penRows.join('')}</tbody></table>`;
    }
  }

  // ── 5. TEAM STATS (shots, faceoffs, hits, etc.) ───────────────────────
  const teamStats = landing.summary?.teamGameStats;
  if (teamStats?.length) {
    const statRows = teamStats.map(s => {
      const label = s.category || s.categoryLabel || s.type || '?';
      const awVal = s.awayValue ?? '—';
      const hmVal = s.homeValue ?? '—';
      // Highlight whichever side is higher (for numeric stats)
      const awNum = parseFloat(awVal);
      const hmNum = parseFloat(hmVal);
      const awBold = (!isNaN(awNum) && !isNaN(hmNum) && awNum > hmNum) ? 'style="color:var(--text);font-weight:700"' : '';
      const hmBold = (!isNaN(awNum) && !isNaN(hmNum) && hmNum > awNum) ? 'style="color:var(--text);font-weight:700"' : '';
      return `<tr>
        <td ${awBold}>${awVal}</td>
        <td class="ts-label">${label}</td>
        <td ${hmBold}>${hmVal}</td>
      </tr>`;
    }).join('');

    html += `<div class="detail-section-label">📊 Team Stats</div>
      <div class="detail-team-labels"><span>${awayAbbr}</span><span>${homeAbbr}</span></div>
      <table class="detail-team-stats"><tbody>${statRows}</tbody></table>`;
  }

  // ── 6. GOALIE STATS ───────────────────────────────────────────────────
  const gameInfo = landing.summary?.gameInfo;
  const renderGoalieRow = (gl, teamAbbr) => {
    if (!gl) return '';
    const name   = gl.name?.default || '?';
    const pid    = gl.playerId;
    const toi    = gl.toi || '';
    const sa     = gl.shotsAgainst ?? '—';
    const ga     = gl.goalsAgainst ?? '—';
    const sv     = gl.saves ?? '—';
    const svp    = gl.savePctg != null ? gl.savePctg.toFixed(3) : '—';
    const starter = gl.starter ? `<span style="font-size:0.6rem;color:var(--gold);background:rgba(255,209,102,0.12);border:1px solid rgba(255,209,102,0.3);border-radius:3px;padding:1px 4px;margin-left:4px">START</span>` : '';
    const img    = pid ? `<img class="scorer-headshot" style="width:28px;height:28px;flex-shrink:0" src="https://assets.nhle.com/mugs/nhl/${season}/${teamAbbr}/${pid}.png" onerror="this.style.display='none'" alt="">` : '';
    return `<tr>
      <td style="display:flex;align-items:center;gap:6px">${img}<span>${name}${starter}</span></td>
      <td style="color:var(--accent);font-weight:700">${teamAbbr}</td>
      <td>${toi}</td>
      <td>${sa}</td>
      <td>${sv}</td>
      <td>${ga}</td>
      <td style="color:var(--gold)">${svp}</td>
    </tr>`;
  };

  const awayGoalies = gameInfo?.awayTeam?.goalies || landing.summary?.iceSurface?.awayTeam?.goalies || [];
  const homeGoalies = gameInfo?.homeTeam?.goalies || landing.summary?.iceSurface?.homeTeam?.goalies || [];
  const allGoalieRows = [
    ...awayGoalies.map(gl => renderGoalieRow(gl, awayAbbr)),
    ...homeGoalies.map(gl => renderGoalieRow(gl, homeAbbr))
  ].filter(Boolean);

  if (allGoalieRows.length) {
    html += `<div class="detail-section-label">🥅 Goalies</div>
      <table class="detail-goalie-table">
        <thead><tr><th>Goalie</th><th>Team</th><th>TOI</th><th>SA</th><th>SV</th><th>GA</th><th>SV%</th></tr></thead>
        <tbody>${allGoalieRows.join('')}</tbody>
      </table>`;
  }

  // ── 7. THREE STARS ────────────────────────────────────────────────────
  const stars = landing.summary?.gameInfo?.threeStars;
  if (stars?.length) {
    const starCards = stars.map((s, i) => {
      const pid   = s.playerId;
      const name  = s.name?.default || '?';
      const teamA = s.teamAbbrev || '';
      const pos   = s.position || '';
      return `<div class="star-card">
        <div class="star-rank">${['⭐','⭐⭐','⭐⭐⭐'][i] || ''}</div>
        ${headshot(pid, teamA)}
        <div class="star-name">${name}</div>
        <div class="star-meta">${[teamA, pos].filter(Boolean).join(' · ')}</div>
      </div>`;
    }).join('');
    html += `<div class="detail-section-label">⭐ Three Stars</div>
      <div class="three-stars-row">${starCards}</div>`;
  }

  if (!html) {
    html = `<div class="detail-loading" style="color:var(--text-dim)">No additional detail available for this game.</div>`;
  }

  body.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// VIDEO MODAL
// ═══════════════════════════════════════════════════════════
function openVideoModal(event, url, title) {
  event.stopPropagation();
  const modal = document.getElementById('videoModal');
  const body = document.getElementById('videoModalBody');
  const titleEl = document.getElementById('videoModalTitle');
  titleEl.textContent = title || 'Goal Highlight';

  // Determine embed strategy
  // NHL highlight links are typically direct MP4 or nhl.com share pages
  let embedHtml = '';

  // Try to detect if it's an mp4/video file
  if (/\.(mp4|webm|ogg|mov)/i.test(url)) {
    embedHtml = `<video controls autoplay playsinline>
      <source src="${url}" type="video/mp4">
      Your browser does not support video playback.
    </video>`;
  } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
    const vid = url.match(/(?:v=|youtu\.be\/)([^&?/]+)/)?.[1];
    if (vid) embedHtml = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
  } else if (url.includes('nhl.com') || url.includes('nhle.com')) {
    // Try iframe embed for NHL pages
    embedHtml = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>`;
  }

  // Fallback for any unrecognized URL
  if (!embedHtml) {
    embedHtml = `<div class="video-modal-fallback">
      <div>🎥 Preview not available in-page.</div>
      <div><a href="${url}" target="_blank" rel="noopener">Open on NHL.com ↗</a></div>
    </div>`;
  }

  body.innerHTML = embedHtml;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeVideoModal(event) {
  // Only close if clicking the backdrop (not the inner modal)
  if (event.target === document.getElementById('videoModal')) {
    closeVideoModalDirect();
  }
}

function closeVideoModalDirect() {
  const modal = document.getElementById('videoModal');
  modal.classList.remove('open');
  document.getElementById('videoModalBody').innerHTML = ''; // stop playback
  document.body.style.overflow = '';
}

// Close on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeVideoModalDirect();
});
