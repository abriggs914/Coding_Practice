<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NHL Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ice: #e8f4fc;
    --ice-dark: #c5dff0;
    --rink: #0a1628;
    --rink-mid: #112240;
    --rink-light: #1a3a6b;
    --accent: #00b4d8;
    --accent2: #ff6b35;
    --gold: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --text: #e2eaf4;
    --text-dim: #7a9bb5;
    --card-bg: #0f2137;
    --card-border: #1e3a5f;
    --live-pulse: #00ff88;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--rink);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,180,216,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(26,58,107,0.3) 0%, transparent 60%);
  }

  /* ──── HEADER ──── */
  header {
    background: linear-gradient(135deg, #071523 0%, #0d2444 100%);
    border-bottom: 2px solid var(--accent);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo span { color: var(--accent); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .spoiler-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--rink-light);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text);
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .spoiler-toggle:hover { background: #213d6e; border-color: var(--accent); }
  .spoiler-toggle.active { background: #1a3a2e; border-color: var(--green); color: var(--green); }

  .eye-icon { font-size: 1rem; }

  /* ──── NAV TABS ──── */
  nav {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--card-border);
    background: var(--rink-mid);
    padding: 0 24px;
  }

  .nav-tab {
    padding: 14px 22px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ──── MAIN ──── */
  main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ──── DATE NAV ──── */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 24px;
  }

  .date-btn {
    background: var(--rink-light);
    border: 1px solid var(--card-border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .date-btn:hover { background: var(--accent); border-color: var(--accent); }

  .date-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--text);
    min-width: 240px;
    text-align: center;
  }

  .today-btn {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent);
    color: var(--rink);
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .today-btn:hover { opacity: 0.85; }

  .refresh-info {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .refresh-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ──── GAME CARDS GRID ──── */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }

  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .game-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

  .game-card.live { border-color: var(--live-pulse); box-shadow: 0 0 16px rgba(0,255,136,0.15); }

  .card-header {
    background: linear-gradient(135deg, #0d2444 0%, #112240 100%);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--card-border);
  }

  .game-status {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .status-live { background: rgba(0,255,136,0.15); color: var(--live-pulse); border: 1px solid var(--live-pulse); }
  .status-final { background: rgba(122,155,181,0.15); color: var(--text-dim); border: 1px solid #2a4060; }
  .status-pre { background: rgba(0,180,216,0.12); color: var(--accent); border: 1px solid rgba(0,180,216,0.4); }
  .status-ppd { background: rgba(255,107,53,0.12); color: var(--accent2); border: 1px solid rgba(255,107,53,0.4); }

  .game-venue {
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.68rem;
    color: var(--live-pulse);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live-pulse);
    animation: pulse 1s infinite;
  }

  /* Teams section */
  .teams-section {
    padding: 18px 16px;
  }

  .team-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
  }
  .team-row:first-child { border-bottom: 1px solid rgba(255,255,255,0.06); }

  .team-logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
    margin-right: 12px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
  .team-logo-placeholder {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--rink-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-right: 12px;
  }

  .team-info { flex: 1; }
  .team-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .team-record { font-size: 0.72rem; color: var(--text-dim); margin-top: 1px; }

  .team-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 1px;
    color: var(--text);
    min-width: 36px;
    text-align: right;
  }
  .team-score.winning { color: var(--gold); }

  /* Spoiler shield — only overlays the sensitive data rows */
  .spoiler-wrap {
    position: relative;
  }
  .spoiler-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 22, 40, 0.92);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    cursor: pointer;
    border-radius: 0;
    transition: opacity 0.2s;
  }
  .spoiler-overlay span {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .spoiler-overlay .lock-icon {
    font-size: 0.85rem;
    opacity: 0.6;
  }
  body.spoiler-off .spoiler-overlay { display: none; }

  /* "Game Over" pill shown in header when spoiler is on and game is final */
  .game-over-pill {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(122,155,181,0.12);
    color: var(--text-dim);
    border: 1px solid #2a4060;
    border-radius: 20px;
    padding: 2px 9px;
  }
  body.spoiler-off .game-over-pill { display: inline-flex; }
  .game-over-pill { display: none; }

  /* Card footer - scorers */
  .card-footer {
    border-top: 1px solid var(--card-border);
    padding: 12px 16px;
    background: rgba(0,0,0,0.2);
  }

  .scorers-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .scorer-list { display: flex; flex-direction: column; gap: 4px; }

  .scorer-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.78rem;
  }
  .scorer-name { color: var(--text); font-weight: 500; }
  .scorer-detail { color: var(--text-dim); font-size: 0.7rem; }
  .scorer-goals {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gold);
    background: rgba(255,209,102,0.1);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* Game situation badge */
  .game-situation {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--card-border);
    flex-wrap: wrap;
  }

  .situation-badge {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,107,53,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
  }
  .situation-badge.pp { background: rgba(255,209,102,0.15); color: var(--gold); border-color: rgba(255,209,102,0.3); }
  .situation-badge.en { background: rgba(239,71,111,0.15); color: var(--red); border-color: rgba(239,71,111,0.3); }

  .period-time {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .start-time {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    text-align: center;
    padding: 8px;
    letter-spacing: 1px;
  }

  /* ──── LOADING / EMPTY ──── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
    color: var(--text-dim);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-games {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  /* ──── STANDINGS VIEW BAR ──── */
  .standings-view-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 8px;
  }
  .view-btn {
    flex: 1;
    padding: 8px 0;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .view-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .view-btn.active { background: var(--rink-light); border-color: var(--accent); color: var(--accent); }

  /* ──── STANDINGS ──── */
  .standings-container { display: flex; flex-direction: column; gap: 32px; }

  .division-block {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
  }

  .division-header {
    background: linear-gradient(135deg, #0d2444 0%, #112240 100%);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--accent);
  }

  .division-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .conference-tag {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--rink-light);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .standings-table {
    width: 100%;
    border-collapse: collapse;
  }
  .standings-table th {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 10px 16px;
    text-align: center;
    border-bottom: 1px solid var(--card-border);
    background: rgba(0,0,0,0.2);
  }
  .standings-table th:first-child { text-align: left; }

  .standings-table td {
    padding: 12px 16px;
    text-align: center;
    font-size: 0.82rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .standings-table td:first-child { text-align: left; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: rgba(255,255,255,0.03); }

  .team-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .standings-logo {
    width: 28px; height: 28px;
    object-fit: contain;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }
  .standings-logo-placeholder {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--rink-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-family: 'Bebas Neue', sans-serif;
    color: var(--text-dim);
  }
  .team-abbrev { font-weight: 700; color: var(--text); font-size: 0.85rem; }
  .team-fullname { font-size: 0.72rem; color: var(--text-dim); }

  .pts-cell { font-weight: 700; color: var(--gold); font-family: 'Roboto Mono', monospace; }
  .pctg-cell { color: var(--accent); font-family: 'Roboto Mono', monospace; font-size: 0.75rem; }
  .streak-cell { font-size: 0.72rem; }
  .streak-w { color: var(--green); font-weight: 600; }
  .streak-l { color: var(--red); font-weight: 600; }
  .streak-ot { color: var(--gold); font-weight: 600; }

  .wildcard-row td { background: rgba(0,180,216,0.04); }
  .wildcard-divider td { border-top: 2px dashed rgba(0,180,216,0.3); }
  .in-playoffs td:first-child { border-left: 3px solid var(--green); }

  /* ──── PLAYOFF BRACKET TREE ──── */
  .bracket-page { padding-bottom: 40px; }

  .bracket-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .bracket-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,209,102,0.3);
  }
  .bracket-header p {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .bracket-reset-btn {
    background: rgba(239,71,111,0.15);
    border: 1px solid rgba(239,71,111,0.4);
    color: var(--red);
    border-radius: 7px;
    padding: 6px 14px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.18s;
  }
  .bracket-reset-btn:hover { background: rgba(239,71,111,0.3); }

  /* Full bracket layout: West rounds flow left→center, East rounds flow right→center */
  .bracket-outer {
    display: flex;
    align-items: flex-start;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 16px;
  }

  .bracket-conference {
    display: flex;
    flex: 1;
    min-width: 0;
  }
  .bracket-conference.west { flex-direction: row; }
  .bracket-conference.east { flex-direction: row-reverse; }

  .bracket-round-col {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 148px;
    padding: 0 6px;
    position: relative;
  }

  .round-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    padding: 8px 0 10px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 8px;
    white-space: nowrap;
  }

  .round-slots {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 0;
  }

  /* Each slot is a flex cell that vertically centers its matchup */
  .bracket-slot {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    flex: 1;
    position: relative;
    padding: 6px 0;
  }

  /* Connector lines */
  .bracket-slot::after {
    content: '';
    position: absolute;
    top: 50%;
    right: -6px;
    width: 6px;
    height: 1px;
    background: var(--card-border);
  }
  .bracket-conference.east .bracket-slot::after {
    right: auto;
    left: -6px;
  }
  .bracket-round-col:last-child .bracket-slot::after { display: none; }

  /* Matchup card */
  .b-matchup {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    overflow: hidden;
    cursor: default;
    transition: border-color 0.18s, box-shadow 0.18s;
    position: relative;
  }
  .b-matchup:hover { border-color: rgba(0,180,216,0.5); }
  .b-matchup.series-live { border-color: var(--live-pulse); box-shadow: 0 0 10px rgba(0,255,136,0.15); }
  .b-matchup.series-done { border-color: var(--card-border); }

  .b-team {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 9px;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    user-select: none;
    position: relative;
  }
  .b-team:first-of-type { border-bottom: 1px solid var(--card-border); }

  /* Clickable only when this slot is ready to pick */
  .b-team.pickable { color: var(--text); }
  .b-team.pickable:hover { background: rgba(0,180,216,0.12); color: var(--accent); }

  .b-team.winner {
    background: rgba(6,214,160,0.1);
    color: var(--green);
    font-weight: 700;
  }
  .b-team.loser {
    color: #3a5570;
    text-decoration: line-through;
    text-decoration-color: rgba(239,71,111,0.5);
  }
  .b-team.user-pick {
    background: rgba(255,209,102,0.1);
    color: var(--gold);
  }
  .b-team.tbd { color: #2a4060; cursor: default; font-style: italic; }

  .b-seed {
    font-size: 0.58rem;
    color: var(--text-dim);
    background: var(--rink-light);
    border-radius: 3px;
    padding: 1px 4px;
    font-family: 'Roboto Mono', monospace;
    min-width: 18px;
    text-align: center;
    flex-shrink: 0;
  }
  .b-logo {
    width: 18px; height: 18px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .b-abbrev { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .b-wins {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-dim);
    flex-shrink: 0;
    min-width: 14px;
    text-align: right;
  }
  .b-wins.leading { color: var(--gold); }
  .b-wins.champion { color: var(--green); }

  .b-series-bar {
    font-size: 0.58rem;
    text-align: center;
    padding: 3px 6px;
    color: var(--text-dim);
    background: rgba(0,0,0,0.25);
    letter-spacing: 0.3px;
    border-top: 1px solid var(--card-border);
    line-height: 1.2;
  }
  .b-series-bar.live-bar { color: var(--live-pulse); }

  /* Stanley Cup Final center column */
  .bracket-final-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 170px;
    padding: 0 8px;
    position: relative;
  }
  .final-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 10px;
    white-space: nowrap;
  }
  .champion-display {
    text-align: center;
    margin-top: 14px;
    padding: 12px;
    background: rgba(255,209,102,0.08);
    border: 1px solid rgba(255,209,102,0.3);
    border-radius: 10px;
  }
  .champion-display .champ-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .champion-display .champ-team {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: #fff;
  }
  .champion-display img {
    width: 48px; height: 48px;
    object-fit: contain;
    display: block;
    margin: 6px auto 0;
  }

  /* Conference labels above bracket */
  .conf-label-row {
    display: flex;
    margin-bottom: 0;
  }
  .conf-label-west, .conf-label-east {
    flex: 1;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    text-align: center;
    padding: 10px 0 6px;
    border-bottom: 2px solid var(--card-border);
    margin-bottom: 4px;
  }
  .conf-label-west { color: var(--accent); border-color: var(--accent); }
  .conf-label-east { color: var(--accent2); border-color: var(--accent2); }
  .conf-label-center { min-width: 186px; }

  /* error */
  .error-msg {
    background: rgba(239,71,111,0.1);
    border: 1px solid rgba(239,71,111,0.3);
    color: var(--red);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 0.82rem;
    text-align: center;
    margin: 20px 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏒 <span>NHL</span> HUB</div>
  <div class="header-controls">
    <button class="spoiler-toggle" id="spoilerBtn" onclick="toggleSpoiler()">
      <span class="eye-icon">🙈</span>
      <span id="spoilerLabel">Hide Scores</span>
    </button>
  </div>
</header>

<nav>
  <div class="nav-tab active" onclick="switchTab('scores')">Scores</div>
  <div class="nav-tab" onclick="switchTab('standings')">Standings</div>
  <div class="nav-tab" onclick="switchTab('playoff')">Playoff Bracket</div>
</nav>

<main>

  <!-- ═══ SCORES TAB ═══ -->
  <div class="tab-content active" id="tab-scores">
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)">◀</button>
      <div class="date-display" id="dateDisplay">—</div>
      <button class="date-btn" onclick="changeDate(1)">▶</button>
      <button class="today-btn" onclick="goToToday()">Today</button>
    </div>
    <div class="refresh-info">
      <span class="refresh-dot"></span>
      <span id="refreshLabel">Auto-refreshing every 30s</span>
    </div>
    <div id="gamesContainer">
      <div class="loading-state"><div class="spinner"></div><span>Loading games…</span></div>
    </div>
  </div>

  <!-- ═══ STANDINGS TAB ═══ -->
  <div class="tab-content" id="tab-standings">
    <div class="standings-view-bar">
      <button class="view-btn active" onclick="setStandingsView('division', this)">Division</button>
      <button class="view-btn" onclick="setStandingsView('conference', this)">Conference</button>
      <button class="view-btn" onclick="setStandingsView('league', this)">League</button>
      <button class="view-btn" onclick="setStandingsView('wildcard', this)">Wild Card</button>
    </div>
    <div id="standingsContainer">
      <div class="loading-state"><div class="spinner"></div><span>Loading standings…</span></div>
    </div>
  </div>

  <!-- ═══ PLAYOFF TAB ═══ -->
  <div class="tab-content" id="tab-playoff">
    <div id="playoffContainer">
      <div class="loading-state"><div class="spinner"></div><span>Loading bracket…</span></div>
    </div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentDate = new Date();
let spoilerMode = false;
let refreshTimer = null;
let standingsLoaded = false;
let playoffLoaded = false;

const PROXY = 'https://corsproxy.io/?';
const API = 'https://api-web.nhle.com/v1';

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dy}`;
}

function displayDate(d) {
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  const str = d.toLocaleDateString('en-US', opts).toUpperCase();
  const today = fmtDate(new Date());
  const cur = fmtDate(d);
  if (cur === today) return 'TODAY — ' + str.split(', ').slice(1).join(', ');
  return str;
}

async function fetchNHL(path) {
  const url = PROXY + encodeURIComponent(API + path);
  const r = await fetch(url, { headers: { 'x-requested-with': 'XMLHttpRequest' } });
  if (!r.ok) throw new Error('API error ' + r.status);
  return r.json();
}

// ═══════════════════════════════════════════════════════════
// SPOILER
// ═══════════════════════════════════════════════════════════
function toggleSpoiler() {
  spoilerMode = !spoilerMode;
  const btn = document.getElementById('spoilerBtn');
  const lbl = document.getElementById('spoilerLabel');
  if (spoilerMode) {
    document.body.classList.remove('spoiler-off');
    btn.classList.add('active');
    btn.querySelector('.eye-icon').textContent = '🙉';
    lbl.textContent = 'Show Scores';
  } else {
    document.body.classList.add('spoiler-off');
    btn.classList.remove('active');
    btn.querySelector('.eye-icon').textContent = '🙈';
    lbl.textContent = 'Hide Scores';
  }
}
// Start with scores visible
document.body.classList.add('spoiler-off');

// ═══════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'standings' && !standingsLoaded) loadStandings();
  if (tab === 'playoff' && !playoffLoaded) loadPlayoff();
}

// ═══════════════════════════════════════════════════════════
// DATE NAV
// ═══════════════════════════════════════════════════════════
function changeDate(delta) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + delta);
  loadGames();
}
function goToToday() {
  currentDate = new Date();
  loadGames();
}

// ═══════════════════════════════════════════════════════════
// GAMES
// ═══════════════════════════════════════════════════════════
async function loadGames() {
  clearTimeout(refreshTimer);
  document.getElementById('dateDisplay').textContent = displayDate(currentDate);
  document.getElementById('gamesContainer').innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading games…</span></div>';

  try {
    const data = await fetchNHL(`/score/${fmtDate(currentDate)}`);
    renderGames(data.games || []);
  } catch(e) {
    document.getElementById('gamesContainer').innerHTML = `<div class="error-msg">⚠️ Could not load games. ${e.message}</div>`;
  }

  const today = fmtDate(new Date());
  const cur = fmtDate(currentDate);
  if (cur === today) {
    refreshTimer = setTimeout(loadGames, 30000);
    document.getElementById('refreshLabel').textContent = 'Auto-refreshing every 30s';
  } else {
    document.getElementById('refreshLabel').textContent = 'Historical data — no auto-refresh';
  }
}

function renderGames(games) {
  const container = document.getElementById('gamesContainer');
  if (!games.length) {
    container.innerHTML = '<div class="no-games">🏒 No games scheduled for this date.</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'games-grid';

  for (const g of games) {
    grid.appendChild(buildCard(g));
  }
  container.innerHTML = '';
  container.appendChild(grid);
}

function buildCard(g) {
  const card = document.createElement('div');
  const state = g.gameState; // 'FUT','PRE','LIVE','CRIT','FINAL','OFF','PPD'
  const isLive = state === 'LIVE' || state === 'CRIT';
  const isFinal = state === 'FINAL' || state === 'OFF';
  const isPre = state === 'FUT' || state === 'PRE';

  card.className = 'game-card' + (isLive ? ' live' : '');

  const away = g.awayTeam, home = g.homeTeam;
  const awayScore = away.score ?? 0;
  const homeScore = home.score ?? 0;
  const awayWin = isFinal && awayScore > homeScore;
  const homeWin = isFinal && homeScore > awayScore;

  // Status label
  let statusHtml = '';
  if (isLive) statusHtml = `<span class="game-status status-live">Live</span>`;
  else if (isFinal) {
    const ot = g.periodDescriptor?.periodType;
    const label = ot === 'OT' ? 'Final/OT' : ot === 'SO' ? 'Final/SO' : 'Final';
    statusHtml = `<span class="game-status status-final">${label}</span>`;
  }
  else if (state === 'PPD') statusHtml = `<span class="game-status status-ppd">Postponed</span>`;
  else statusHtml = `<span class="game-status status-pre">Upcoming</span>`;

  // Period / time info
  let periodInfo = '';
  if (isLive) {
    const per = g.periodDescriptor;
    const pLabel = per?.periodType === 'OT' ? 'OT' : per?.periodType === 'SO' ? 'SO' : `P${per?.number || '?'}`;
    const clock = g.clock?.timeRemaining || '';
    const inInt = g.clock?.inIntermission;
    periodInfo = `<div class="game-situation">
      <span class="period-time">${inInt ? 'INT' : pLabel} ${clock ? '— ' + clock : ''}</span>
      ${g.situation?.homeTeam?.strength === 'pp' ? `<span class="situation-badge pp">🏒 ${home.abbrev} PP</span>` : ''}
      ${g.situation?.awayTeam?.strength === 'pp' ? `<span class="situation-badge pp">🏒 ${away.abbrev} PP</span>` : ''}
      ${g.situation?.homeTeam?.emptyNet ? `<span class="situation-badge en">EN ${home.abbrev}</span>` : ''}
      ${g.situation?.awayTeam?.emptyNet ? `<span class="situation-badge en">EN ${away.abbrev}</span>` : ''}
    </div>`;
  }

  // Start time
  let startTimeHtml = '';
  if (isPre && g.startTimeUTC) {
    const t = new Date(g.startTimeUTC);
    const local = t.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short' });
    startTimeHtml = `<div class="start-time">${local}</div>`;
  }

  // Scorers
  const goals = (g.goals || []).slice().reverse();
  let scorersHtml = '';
  if (isFinal || isLive) {
    const scorerItems = goals.slice(0, 5).map(gl => {
      const teamAbbr = gl.teamAbbrev?.default || '';
      const name = gl.name?.default || 'Unknown';
      const assists = gl.assists?.map(a => a.name?.default?.split(' ').pop()).join(', ') || '';
      const time = gl.timeInPeriod ? `P${gl.periodDescriptor?.number} ${gl.timeInPeriod}` : '';
      return `<div class="scorer-item">
        <span class="scorer-name">${name} <span style="color:var(--accent);font-size:0.7rem">${teamAbbr}</span></span>
        <span class="scorer-detail">${assists ? assists + ' · ' : ''}${time}</span>
      </div>`;
    }).join('');

    if (goals.length) {
      scorersHtml = `<div class="card-footer">
        <div class="scorers-label">Goal Scorers</div>
        <div class="scorer-list">${scorerItems}</div>
        ${goals.length > 5 ? `<div style="font-size:0.7rem;color:var(--text-dim);margin-top:6px">+${goals.length - 5} more goals</div>` : ''}
      </div>`;
    }
  }

  // Pre-game: team leaders
  let leadersHtml = '';
  if (isPre) {
    const awayLeaders = away.leaders || [];
    const homeLeaders = home.leaders || [];
    const allLeaders = [...awayLeaders.slice(0,1).map(l => ({...l, team: away.abbrev})),
                        ...homeLeaders.slice(0,1).map(l => ({...l, team: home.abbrev}))];
    if (allLeaders.length) {
      const items = allLeaders.map(l => {
        const name = l.name?.default || 'N/A';
        const pts = l.value || '';
        const cat = l.category || 'pts';
        return `<div class="scorer-item">
          <span class="scorer-name">${name} <span style="color:var(--accent);font-size:0.7rem">${l.team}</span></span>
          <span class="scorer-goals">${pts} ${cat}</span>
        </div>`;
      }).join('');
      leadersHtml = `<div class="card-footer">
        <div class="scorers-label">Team Leaders</div>
        <div class="scorer-list">${items}</div>
      </div>`;
    }
  }

  // Logos
  const awayLogoUrl = away.logo || away.darkLogo;
  const homeLogoUrl = home.logo || home.darkLogo;
  const awayLogoHtml = awayLogoUrl
    ? `<img class="team-logo" src="${awayLogoUrl}" alt="${away.abbrev}" onerror="this.style.display='none'">`
    : `<div class="team-logo-placeholder">${away.abbrev}</div>`;
  const homeLogoHtml = homeLogoUrl
    ? `<img class="team-logo" src="${homeLogoUrl}" alt="${home.abbrev}" onerror="this.style.display='none'">`
    : `<div class="team-logo-placeholder">${home.abbrev}</div>`;

  const awayRecordStr = away.record ? `<div class="team-record">${away.record}</div>` : '';
  const homeRecordStr = home.record ? `<div class="team-record">${home.record}</div>` : '';

  const venue = g.venue?.default || '';

  // Sensitive sections: scores, period/time info, scorers — wrapped with spoiler overlay
  // The card header (teams, venue, status) is always visible

  const spoilerOverlay = (isFinal || isLive)
    ? `<div class="spoiler-overlay" onclick="revealSection(this)"><span class="lock-icon">🔒</span><span>Reveal Score</span></div>`
    : '';

  const finalIndicator = isFinal
    ? `<span class="game-over-pill">Game Over</span>`
    : '';

  card.innerHTML = `
    <div class="card-header">
      ${statusHtml}
      <div style="display:flex;align-items:center;gap:8px;">
        ${finalIndicator}
        ${isLive ? `<div class="live-indicator"><span class="live-dot"></span>LIVE</div>` : `<div class="game-venue">${venue}</div>`}
      </div>
    </div>
    <div class="teams-section">
      <div class="team-row">
        ${awayLogoHtml}
        <div class="team-info">
          <div class="team-name">${away.name?.default || away.placeName?.default || away.abbrev}</div>
          ${awayRecordStr}
        </div>
        <div class="spoiler-wrap" style="min-width:36px">
          ${spoilerOverlay}
          <div class="team-score ${awayWin ? 'winning' : ''}">${!isPre ? awayScore : ''}</div>
        </div>
      </div>
      <div class="team-row">
        ${homeLogoHtml}
        <div class="team-info">
          <div class="team-name">${home.name?.default || home.placeName?.default || home.abbrev}</div>
          ${homeRecordStr}
        </div>
        <div class="spoiler-wrap" style="min-width:36px">
          ${spoilerOverlay}
          <div class="team-score ${homeWin ? 'winning' : ''}">${!isPre ? homeScore : ''}</div>
        </div>
      </div>
    </div>
    <div class="spoiler-wrap">
      ${(isLive || isFinal) && spoilerOverlay ? `<div class="spoiler-overlay" onclick="revealSection(this)"><span class="lock-icon">🔒</span><span>Reveal Details</span></div>` : ''}
      ${periodInfo}
      ${startTimeHtml}
    </div>
    <div class="spoiler-wrap">
      ${(isLive || isFinal) && spoilerOverlay ? `<div class="spoiler-overlay" onclick="revealSection(this)"><span class="lock-icon">🔒</span><span>Reveal Scorers</span></div>` : ''}
      ${scorersHtml}
      ${leadersHtml}
    </div>
  `;
  return card;
}

function revealSection(overlay) {
  // Reveal all spoiler overlays on this card
  const card = overlay.closest('.game-card');
  card.querySelectorAll('.spoiler-overlay').forEach(el => el.style.display = 'none');
}

let standingsView = 'division';
let cachedStandings = [];

function setStandingsView(view, btn) {
  standingsView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (cachedStandings.length) renderStandings(cachedStandings);
}
async function loadStandings() {
  try {
    const data = await fetchNHL('/standings/now');
    renderStandings(data.standings || []);
    standingsLoaded = true;
  } catch(e) {
    document.getElementById('standingsContainer').innerHTML = `<div class="error-msg">⚠️ Could not load standings. ${e.message}</div>`;
  }
}

async function loadStandings() {
  try {
    const data = await fetchNHL('/standings/now');
    cachedStandings = data.standings || [];
    renderStandings(cachedStandings);
    standingsLoaded = true;
  } catch(e) {
    document.getElementById('standingsContainer').innerHTML = `<div class="error-msg">⚠️ Could not load standings. ${e.message}</div>`;
  }
}

function renderStandings(teams) {
  if (standingsView === 'division') renderDivisionView(teams);
  else if (standingsView === 'conference') renderConferenceView(teams);
  else if (standingsView === 'league') renderLeagueView(teams);
  else if (standingsView === 'wildcard') renderWildcardView(teams);
}

function renderDivisionView(teams) {
  const divMap = {};
  for (const t of teams) {
    const div = t.divisionName;
    const conf = t.conferenceName;
    if (!divMap[div]) divMap[div] = { conf, teams: [] };
    divMap[div].teams.push(t);
  }
  for (const d of Object.values(divMap)) d.teams.sort((a,b) => b.points - a.points);
  const divOrder = ['Atlantic', 'Metropolitan', 'Central', 'Pacific'];
  let html = '<div class="standings-container">';
  for (const divName of divOrder) {
    const div = divMap[divName];
    if (!div) continue;
    html += buildDivisionTable(divName, div.conf, div.teams, 'division');
  }
  html += '</div>';
  document.getElementById('standingsContainer').innerHTML = html;
}

function renderConferenceView(teams) {
  const confMap = {};
  for (const t of teams) {
    const c = t.conferenceName;
    if (!confMap[c]) confMap[c] = [];
    confMap[c].push(t);
  }
  for (const c of Object.values(confMap)) c.sort((a,b) => b.points - a.points);
  let html = '<div class="standings-container">';
  for (const [confName, confTeams] of Object.entries(confMap).sort()) {
    html += buildDivisionTable(confName + ' Conference', '', confTeams, 'conference');
  }
  html += '</div>';
  document.getElementById('standingsContainer').innerHTML = html;
}

function renderLeagueView(teams) {
  const sorted = [...teams].sort((a,b) => b.points - a.points || b.pointPctg - a.pointPctg);
  let html = '<div class="standings-container">';
  html += buildDivisionTable('League', '', sorted, 'league');
  html += '</div>';
  document.getElementById('standingsContainer').innerHTML = html;
}

function renderWildcardView(teams) {
  const divMap = { Atlantic: [], Metropolitan: [], Central: [], Pacific: [] };
  for (const t of teams) {
    if (divMap[t.divisionName]) divMap[t.divisionName].push(t);
  }
  for (const d of Object.values(divMap)) d.sort((a,b) => b.points - a.points);

  // East: Top 3 from each division + 2 wildcards from rest
  const eastDiv1Top = divMap['Atlantic'].slice(0,3);
  const eastDiv2Top = divMap['Metropolitan'].slice(0,3);
  const eastWC = [...divMap['Atlantic'].slice(3), ...divMap['Metropolitan'].slice(3)]
    .sort((a,b) => b.points - a.points);

  const westDiv1Top = divMap['Central'].slice(0,3);
  const westDiv2Top = divMap['Pacific'].slice(0,3);
  const westWC = [...divMap['Central'].slice(3), ...divMap['Pacific'].slice(3)]
    .sort((a,b) => b.points - a.points);

  let html = '<div class="standings-container">';
  html += buildWildcardBlock('Eastern Conference', 'Atlantic', eastDiv1Top, 'Metropolitan', eastDiv2Top, eastWC);
  html += buildWildcardBlock('Western Conference', 'Central', westDiv1Top, 'Pacific', westDiv2Top, westWC);
  html += '</div>';
  document.getElementById('standingsContainer').innerHTML = html;
}

function buildWildcardBlock(confName, div1Name, div1Teams, div2Name, div2Teams, wcTeams) {
  const buildMiniTable = (label, teamsList, showWCLine) => {
    const rows = teamsList.map((t, i) => {
      const logo = t.teamLogo ? `<img class="standings-logo" src="${t.teamLogo}" alt="${t.teamAbbrev?.default}" onerror="this.style.display='none'">` : `<div class="standings-logo-placeholder">${t.teamAbbrev?.default||'?'}</div>`;
      const streak = t.streakCode || '-';
      const sc = streak.startsWith('W') ? 'streak-w' : streak.startsWith('L') ? 'streak-l' : streak.startsWith('O') ? 'streak-ot' : '';
      const wc = showWCLine && i === 2;
      return `<tr class="${i < (showWCLine ? 3 : 3) ? 'in-playoffs' : ''} ${wc ? 'wildcard-divider' : ''}">
        <td><div class="team-cell">${logo}<div><div class="team-abbrev">${t.teamAbbrev?.default||''}</div><div class="team-fullname">${t.teamName?.default||''}</div></div></div></td>
        <td>${t.gamesPlayed||0}</td><td>${t.wins||0}</td><td>${t.losses||0}</td><td>${t.otLosses||0}</td>
        <td class="pts-cell">${t.points||0}</td>
        <td class="pctg-cell">${t.pointPctg?.toFixed(3)||'.000'}</td>
        <td class="${sc} streak-cell">${streak}</td>
      </tr>`;
    }).join('');
    return `<div style="margin-bottom:4px">
      <div style="font-size:0.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:8px 16px;border-bottom:1px solid var(--card-border)">${label}</div>
      <table class="standings-table"><thead><tr><th>Team</th><th>GP</th><th>W</th><th>L</th><th>OT</th><th>PTS</th><th>P%</th><th>STK</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  };

  const wcRows = wcTeams.map((t, i) => {
    const logo = t.teamLogo ? `<img class="standings-logo" src="${t.teamLogo}" alt="${t.teamAbbrev?.default}" onerror="this.style.display='none'">` : `<div class="standings-logo-placeholder">${t.teamAbbrev?.default||'?'}</div>`;
    const streak = t.streakCode || '-';
    const sc = streak.startsWith('W') ? 'streak-w' : streak.startsWith('L') ? 'streak-l' : streak.startsWith('O') ? 'streak-ot' : '';
    return `<tr class="${i < 2 ? 'in-playoffs' : ''} ${i === 2 ? 'wildcard-divider' : ''}">
      <td><div class="team-cell">${logo}<div><div class="team-abbrev">${t.teamAbbrev?.default||''}</div><div class="team-fullname">${t.teamName?.default||''}</div></div></div></td>
      <td>${t.gamesPlayed||0}</td><td>${t.wins||0}</td><td>${t.losses||0}</td><td>${t.otLosses||0}</td>
      <td class="pts-cell">${t.points||0}</td>
      <td class="pctg-cell">${t.pointPctg?.toFixed(3)||'.000'}</td>
      <td class="${sc} streak-cell">${streak}</td>
    </tr>`;
  }).join('');

  return `<div class="division-block">
    <div class="division-header">
      <div class="division-name">${confName}</div>
      <div class="conference-tag">Wild Card Race</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--card-border)">
      ${buildMiniTable(div1Name, div1Teams, false)}
      ${buildMiniTable(div2Name, div2Teams, false)}
    </div>
    <div>
      <div style="font-size:0.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);padding:8px 16px;border-bottom:1px solid var(--card-border);background:rgba(0,180,216,0.05)">Wild Card</div>
      <table class="standings-table"><thead><tr><th>Team</th><th>GP</th><th>W</th><th>L</th><th>OT</th><th>PTS</th><th>P%</th><th>STK</th></tr></thead><tbody>${wcRows}</tbody></table>
    </div>
  </div>`;
}

function buildDivisionTable(divName, conf, teams, viewMode) {
  const rows = teams.map((t, i) => {
    const logo = t.teamLogo;
    const logoHtml = logo
      ? `<img class="standings-logo" src="${logo}" alt="${t.teamAbbrev?.default}" onerror="this.style.display='none'">`
      : `<div class="standings-logo-placeholder">${t.teamAbbrev?.default || '?'}</div>`;

    const streak = t.streakCode || '-';
    let streakClass = '';
    if (streak.startsWith('W')) streakClass = 'streak-w';
    else if (streak.startsWith('L')) streakClass = 'streak-l';
    else if (streak.startsWith('O')) streakClass = 'streak-ot';

    const inPlayoffs = viewMode === 'league' ? i < 16 : viewMode === 'conference' ? i < 8 : i < 3;
    const isWCLine = viewMode === 'league' ? i === 16 : viewMode === 'conference' ? i === 8 : i === 3;

    // For league/conference view, show division name in team cell
    const divLabel = (viewMode === 'league' || viewMode === 'conference') && t.divisionName
      ? `<span style="font-size:0.62rem;color:var(--accent);margin-left:4px">${t.divisionAbbrev || t.divisionName?.slice(0,3).toUpperCase()}</span>`
      : '';

    return `<tr class="${inPlayoffs ? 'in-playoffs' : ''} ${isWCLine ? 'wildcard-divider' : ''}">
      <td><div class="team-cell">
        ${logoHtml}
        <div>
          <div class="team-abbrev">${t.teamAbbrev?.default || ''}${divLabel}</div>
          <div class="team-fullname">${t.teamName?.default || ''}</div>
        </div>
      </div></td>
      <td>${t.gamesPlayed || 0}</td>
      <td>${t.wins || 0}</td>
      <td>${t.losses || 0}</td>
      <td>${t.otLosses || 0}</td>
      <td class="pts-cell">${t.points || 0}</td>
      <td class="pctg-cell">${t.pointPctg?.toFixed(3) || '.000'}</td>
      <td>${t.goalFor || 0}</td>
      <td>${t.goalAgainst || 0}</td>
      <td class="${streakClass} streak-cell">${streak}</td>
      <td>${t.l10Wins || 0}-${t.l10Losses || 0}-${t.l10OtLosses || 0}</td>
    </tr>`;
  }).join('');

  const confTag = conf ? `<div class="conference-tag">${conf} Conference</div>` : '';

  return `<div class="division-block">
    <div class="division-header">
      <div class="division-name">${divName}</div>
      ${confTag}
    </div>
    <table class="standings-table">
      <thead>
        <tr>
          <th>Team</th>
          <th>GP</th><th>W</th><th>L</th><th>OT</th>
          <th>PTS</th><th>P%</th>
          <th>GF</th><th>GA</th>
          <th>STK</th><th>L10</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// PLAYOFF BRACKET — Interactive Tree
// ═══════════════════════════════════════════════════════════

// bracketState[slotId] = { top, bot, topWins, botWins, winner, userPick, live, seriesLabel }
// slotId format: "W-R1-0", "E-R2-1", "CUP"
let bracketState = {};
let rawSeriesData = [];   // from API
let useProjection = false;

async function loadPlayoff() {
  try {
    const season = '20242025';
    const data = await fetchNHL(`/playoff-bracket/${season}`);
    rawSeriesData = data.series || [];
    if (!rawSeriesData.length) throw new Error('no series');
    initBracketFromAPI(rawSeriesData);
    playoffLoaded = true;
  } catch(e) {
    try {
      const standingsData = await fetchNHL('/standings/now');
      useProjection = true;
      initBracketFromStandings(standingsData.standings || []);
      playoffLoaded = true;
    } catch(e2) {
      document.getElementById('playoffContainer').innerHTML = `<div class="error-msg">⚠️ Could not load playoff data. ${e2.message}</div>`;
    }
  }
}

// ── Build state from live API data ──────────────────────────
function initBracketFromAPI(series) {
  bracketState = {};

  // Split by conference and round
  const westSeries = series.filter(s => s.conferenceName === 'Western' || s.conference === 'Western');
  const eastSeries = series.filter(s => s.conferenceName === 'Eastern' || s.conference === 'Eastern');
  const finalSeries = series.find(s => s.round === 4 && !s.conferenceName) || series.find(s => s.round === 4);

  const pushSlots = (conf, confSeries) => {
    // Sort each round's series by their seriesCode or seed order
    for (let r = 1; r <= 3; r++) {
      const roundSeries = confSeries.filter(s => s.round === r)
        .sort((a,b) => (a.seriesCode || a.topSeedTeam?.seed || 0) - (b.seriesCode || b.topSeedTeam?.seed || 0));
      roundSeries.forEach((s, i) => {
        const id = `${conf}-R${r}-${i}`;
        const topW = s.topSeedWins ?? 0;
        const botW = s.bottomSeedWins ?? 0;
        const done = topW === 4 || botW === 4;
        bracketState[id] = {
          top: teamFromAPI(s.topSeedTeam),
          bot: teamFromAPI(s.bottomSeedTeam),
          topWins: topW,
          botWins: botW,
          winner: done ? (topW === 4 ? 'top' : 'bot') : null,
          userPick: null,
          live: !done && (topW > 0 || botW > 0),
          seriesLabel: s.seriesLetter || ''
        };
      });
    }
  };

  pushSlots('W', westSeries);
  pushSlots('E', eastSeries);

  // Final
  if (finalSeries) {
    const topW = finalSeries.topSeedWins ?? 0;
    const botW = finalSeries.bottomSeedWins ?? 0;
    const done = topW === 4 || botW === 4;
    bracketState['CUP'] = {
      top: teamFromAPI(finalSeries.topSeedTeam),
      bot: teamFromAPI(finalSeries.bottomSeedTeam),
      topWins: topW,
      botWins: botW,
      winner: done ? (topW === 4 ? 'top' : 'bot') : null,
      userPick: null,
      live: !done && (topW > 0 || botW > 0)
    };
  } else {
    bracketState['CUP'] = emptySlot();
  }

  // Fill later rounds from winners if API gave us that data
  propagateWinners();
  renderBracket();
}

function teamFromAPI(t) {
  if (!t) return null;
  return {
    abbrev: t.abbrev || t.teamAbbrev || '?',
    logo: t.logo || t.teamLogo || '',
    seed: t.seed ?? null,
    name: t.name || t.teamName || t.abbrev || '?'
  };
}

// ── Build state from standings projection ───────────────────
function initBracketFromStandings(standings) {
  bracketState = {};
  const divMap = { Atlantic:[], Metropolitan:[], Central:[], Pacific:[] };
  for (const t of standings) { if (divMap[t.divisionName]) divMap[t.divisionName].push(t); }
  for (const d of Object.values(divMap)) d.sort((a,b) => b.points - a.points);

  const mkTeam = (t, seed) => t ? { abbrev: t.teamAbbrev?.default||'?', logo: t.teamLogo||'', seed, name: t.teamName?.default||'' } : null;

  // West seeds: C1,P1,C2,P2,WC1,WC2,C3,P3  → matchups: 1v8,2v7,3v6,4v5
  const cTop = divMap['Central'].slice(0,3);
  const pTop = divMap['Pacific'].slice(0,3);
  const wWC = [...divMap['Central'].slice(3), ...divMap['Pacific'].slice(3)].sort((a,b)=>b.points-a.points).slice(0,2);
  const westSeeds = [
    mkTeam(cTop[0],1), mkTeam(pTop[0],2), mkTeam(cTop[1],3), mkTeam(pTop[1],4),
    mkTeam(wWC[0],5), mkTeam(wWC[1],6), mkTeam(cTop[2],7), mkTeam(pTop[2],8)
  ];
  // East seeds
  const aTop = divMap['Atlantic'].slice(0,3);
  const mTop = divMap['Metropolitan'].slice(0,3);
  const eWC = [...divMap['Atlantic'].slice(3), ...divMap['Metropolitan'].slice(3)].sort((a,b)=>b.points-a.points).slice(0,2);
  const eastSeeds = [
    mkTeam(aTop[0],1), mkTeam(mTop[0],2), mkTeam(aTop[1],3), mkTeam(mTop[1],4),
    mkTeam(eWC[0],5), mkTeam(eWC[1],6), mkTeam(aTop[2],7), mkTeam(mTop[2],8)
  ];

  // Classic bracket: (1v8),(2v7),(3v6),(4v5) for R1
  const r1pairs = [[0,7],[1,6],[2,5],[3,4]];
  ['W','E'].forEach((conf, ci) => {
    const seeds = ci === 0 ? westSeeds : eastSeeds;
    r1pairs.forEach(([a,b], i) => {
      bracketState[`${conf}-R1-${i}`] = { top:seeds[a], bot:seeds[b], topWins:0, botWins:0, winner:null, userPick:null, live:false };
    });
    for (let r = 2; r <= 3; r++) {
      const count = r === 2 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        bracketState[`${conf}-R${r}-${i}`] = emptySlot();
      }
    }
  });
  bracketState['CUP'] = emptySlot();
  renderBracket();
}

function emptySlot() {
  return { top:null, bot:null, topWins:0, botWins:0, winner:null, userPick:null, live:false };
}

// ── Propagate API winners into subsequent rounds ─────────────
function propagateWinners() {
  ['W','E'].forEach(conf => {
    // R1 winners feed R2
    for (let i = 0; i < 4; i++) {
      const slot = bracketState[`${conf}-R1-${i}`];
      if (!slot?.winner) continue;
      const winner = slot.winner === 'top' ? slot.top : slot.bot;
      const r2idx = Math.floor(i / 2);
      const r2slot = bracketState[`${conf}-R2-${r2idx}`];
      if (!r2slot) continue;
      if (i % 2 === 0) r2slot.top = r2slot.top || winner;
      else r2slot.bot = r2slot.bot || winner;
    }
    // R2 winners feed R3
    for (let i = 0; i < 2; i++) {
      const slot = bracketState[`${conf}-R2-${i}`];
      if (!slot?.winner) continue;
      const winner = slot.winner === 'top' ? slot.top : slot.bot;
      const r3slot = bracketState[`${conf}-R3-0`];
      if (!r3slot) continue;
      if (i === 0) r3slot.top = r3slot.top || winner;
      else r3slot.bot = r3slot.bot || winner;
    }
    // R3 winner feeds CUP
    const cfSlot = bracketState[`${conf}-R3-0`];
    if (cfSlot?.winner) {
      const winner = cfSlot.winner === 'top' ? cfSlot.top : cfSlot.bot;
      if (conf === 'W') bracketState['CUP'].top = bracketState['CUP'].top || winner;
      else bracketState['CUP'].bot = bracketState['CUP'].bot || winner;
    }
  });
}

// ── User picks a winner ──────────────────────────────────────
function pickWinner(slotId, side) {
  const slot = bracketState[slotId];
  if (!slot) return;
  // Only allow picking if the team exists and slot not already officially decided
  const team = side === 'top' ? slot.top : slot.bot;
  if (!team) return;
  if (slot.winner) return; // API says it's done, no overriding

  // Toggle: clicking same pick removes it
  if (slot.userPick === side) {
    slot.userPick = null;
    // Remove downstream picks that depended on this
    clearDownstream(slotId, side);
  } else {
    const prevPick = slot.userPick;
    slot.userPick = side;
    if (prevPick) clearDownstream(slotId, prevPick);
    // Advance winner to next round
    advanceUserPick(slotId, team);
  }
  renderBracket();
}

function advanceUserPick(slotId, team) {
  const [conf, roundStr, idxStr] = slotId.split('-');
  const round = parseInt(roundStr.replace('R',''));
  const idx = parseInt(idxStr);

  let nextId, nextSide;
  if (round === 1) {
    nextId = `${conf}-R2-${Math.floor(idx/2)}`;
    nextSide = idx % 2 === 0 ? 'top' : 'bot';
  } else if (round === 2) {
    nextId = `${conf}-R3-0`;
    nextSide = idx === 0 ? 'top' : 'bot';
  } else if (round === 3) {
    nextId = 'CUP';
    nextSide = conf === 'W' ? 'top' : 'bot';
  } else { return; }

  const nextSlot = bracketState[nextId];
  if (!nextSlot) return;
  if (nextSide === 'top') nextSlot.top = team;
  else nextSlot.bot = team;
}

function clearDownstream(slotId, side) {
  const [conf, roundStr, idxStr] = slotId.split('-');
  if (!roundStr) return; // CUP has no downstream
  const round = parseInt(roundStr.replace('R',''));
  const idx = parseInt(idxStr);

  let nextId, nextSide;
  if (round === 1) {
    nextId = `${conf}-R2-${Math.floor(idx/2)}`;
    nextSide = idx % 2 === 0 ? 'top' : 'bot';
  } else if (round === 2) {
    nextId = `${conf}-R3-0`;
    nextSide = idx === 0 ? 'top' : 'bot';
  } else if (round === 3) {
    nextId = 'CUP';
    nextSide = conf === 'W' ? 'top' : 'bot';
  } else { return; }

  const nextSlot = bracketState[nextId];
  if (!nextSlot) return;
  // Only clear if it's a user pick that came from here (not official data)
  if (!nextSlot.winner) {
    if (nextSide === 'top') nextSlot.top = null;
    else nextSlot.bot = null;
    if (nextSlot.userPick) {
      clearDownstream(nextId, nextSlot.userPick);
      nextSlot.userPick = null;
    }
  }
}

function resetBracket() {
  // Clear all user picks and re-init
  if (useProjection) {
    for (const id in bracketState) {
      const s = bracketState[id];
      s.userPick = null;
      if (id.includes('R2') || id.includes('R3') || id === 'CUP') {
        s.top = null; s.bot = null;
      }
    }
    // Re-seed R1 teams (they are already in R1 slots)
  } else {
    initBracketFromAPI(rawSeriesData);
    return;
  }
  renderBracket();
}

// ── Render ──────────────────────────────────────────────────
function renderBracket() {
  const roundNames = {1:'Round 1', 2:'Second Round', 3:'Conf. Final'};
  const subtitle = useProjection ? 'Projected from current standings · Click a team to pick winners' : '2024–2025 Season · Click a team to pick winners';

  const buildRoundCol = (conf, round, slots) => {
    const slotDivs = slots.map(([id, slot]) => {
      return `<div class="bracket-slot">${buildMatchup(id, slot, conf, round)}</div>`;
    }).join('');
    return `<div class="bracket-round-col">
      <div class="round-label">${roundNames[round] || 'Round '+round}</div>
      <div class="round-slots">${slotDivs}</div>
    </div>`;
  };

  const buildConf = (conf) => {
    const cols = [];
    for (let r = 1; r <= 3; r++) {
      const slots = [];
      const count = r === 1 ? 4 : r === 2 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        const id = `${conf}-R${r}-${i}`;
        slots.push([id, bracketState[id] || emptySlot()]);
      }
      cols.push(buildRoundCol(conf, r, slots));
    }
    return cols.join('');
  };

  const cupSlot = bracketState['CUP'] || emptySlot();
  const champion = cupSlot.winner ? (cupSlot.winner === 'top' ? cupSlot.top : cupSlot.bot) : (cupSlot.userPick ? (cupSlot.userPick === 'top' ? cupSlot.top : cupSlot.bot) : null);
  const champHtml = champion ? `
    <div class="champion-display">
      <div class="champ-label">🏆 Champion</div>
      ${champion.logo ? `<img src="${champion.logo}" onerror="this.style.display='none'">` : ''}
      <div class="champ-team">${champion.abbrev}</div>
    </div>` : '';

  const html = `
    <div class="bracket-page">
      <div class="bracket-header">
        <h1>🏒 Stanley Cup Playoffs</h1>
        <p>${subtitle}</p>
        <button class="bracket-reset-btn" onclick="resetBracket()">↺ Reset Picks</button>
      </div>
      <div class="conf-label-row">
        <div class="conf-label-west">Western Conference</div>
        <div class="conf-label-center"></div>
        <div class="conf-label-east">Eastern Conference</div>
      </div>
      <div class="bracket-outer">
        <div class="bracket-conference west">${buildConf('W')}</div>
        <div class="bracket-final-col">
          <div class="final-label">Stanley Cup<br>Final</div>
          ${buildMatchup('CUP', cupSlot, 'CUP', 4)}
          ${champHtml}
        </div>
        <div class="bracket-conference east">${buildConf('E')}</div>
      </div>
    </div>`;

  document.getElementById('playoffContainer').innerHTML = html;
}

function buildMatchup(id, slot, conf, round) {
  if (!slot) slot = emptySlot();
  const { top, bot, topWins, botWins, winner, userPick, live } = slot;

  const maxW = 4;
  const topDone = winner === 'top';
  const botDone = winner === 'bot';
  const effectiveWinner = winner || userPick;

  const teamRow = (side, team, wins) => {
    if (!team) {
      return `<div class="b-team tbd"><span class="b-abbrev">TBD</span></div>`;
    }
    const isWinner = effectiveWinner === side;
    const isLoser = effectiveWinner && effectiveWinner !== side;
    const isUserPick = !winner && userPick === side;
    const isOfficialWin = winner === side;
    const canPick = !winner && team; // user can pick if no official winner

    let cls = 'b-team';
    if (isOfficialWin) cls += ' winner';
    else if (isLoser && winner) cls += ' loser';
    else if (isUserPick) cls += ' user-pick';
    else if (canPick) cls += ' pickable';

    const winsDisplay = wins > 0 ? wins : '';
    const winsCls = wins === maxW ? 'b-wins champion' : wins > 0 && wins > (side==='top'?botWins:topWins) ? 'b-wins leading' : 'b-wins';

    const logoHtml = team.logo ? `<img class="b-logo" src="${team.logo}" onerror="this.style.display='none'">` : '';
    const seedHtml = team.seed ? `<span class="b-seed">${team.seed}</span>` : '';
    const clickAttr = canPick ? `onclick="pickWinner('${id}','${side}')"` : '';

    return `<div class="${cls}" ${clickAttr}>
      ${seedHtml}${logoHtml}
      <span class="b-abbrev">${team.abbrev}</span>
      <span class="${winsCls}">${winsDisplay}</span>
    </div>`;
  };

  // Series status bar
  let barText = '';
  let barCls = 'b-series-bar';
  if (winner === 'top') barText = `${top?.abbrev} wins 4-${botWins}`;
  else if (winner === 'bot') barText = `${bot?.abbrev} wins 4-${topWins}`;
  else if (live) { barText = `Series ${topWins}-${botWins}`; barCls += ' live-bar'; }
  else if (userPick) barText = `Predicted: ${effectiveWinner==='top'?top?.abbrev:bot?.abbrev}`;
  else if (top && bot) barText = 'Click to predict';
  else barText = 'Awaiting teams';

  const liveCls = live ? ' series-live' : winner ? ' series-done' : '';

  return `<div class="b-matchup${liveCls}">
    ${teamRow('top', top, topWins)}
    ${teamRow('bot', bot, botWins)}
    <div class="${barCls}">${barText}</div>
  </div>`;
}

loadGames();
